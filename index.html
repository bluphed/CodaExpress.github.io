<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coda Express</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Coda Express</h1>
    </header>
    <main>
        <form>
            <input type="text" class="focus:ring-2" placeholder="Enter text">
            <button type="submit" class="w-full mt-5 bg-white text-coda font-bold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-white/90 transition-all btn-touch shadow-sm">Submit</button>
        </form>
        <button class="w-full bg-coda text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-lg hover:opacity-90 active:scale-95 btn-touch">Click Me!</button>
    </main>
    <footer>
        <p>&copy; 2026 Coda Express</p>
    </footer>
</body>
</html>
