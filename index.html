<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Coda Express - Calculadora de Delivery</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-coda: #DE440D;
            --bg-primary: #f8fafc;
            --text-primary: #1e293b;
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
        }

        .dark-mode {
            --bg-primary: #0f172a;
            --text-primary: #f1f5f9;
            --border-color: #334155;
            --card-bg: #1e293b;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* Pantalla de carga con logo Coda Express */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .dark-mode .splash-screen {
            background: #0f172a;
        }
        
        .splash-logo {
            width: 120px;
            height: 120px;
            background: #DE440D;
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out;
            box-shadow: 0 10px 25px rgba(222,68,13,0.3);
        }
        
        .splash-logo svg {
            width: 70px;
            height: 70px;
            color: white;
        }
        
        .splash-title {
            font-size: 28px;
            font-weight: bold;
            color: #DE440D;
            letter-spacing: 2px;
        }
        
        .splash-subtitle {
            font-size: 14px;
            color: #64748b;
            margin-top: 8px;
        }
        
        .splash-loader {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #DE440D;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 30px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .hidden {
            display: none !important;
        }
        
        .bg-coda { background-color: var(--color-coda); }
        .text-coda { color: var(--color-coda); }
        .bg-card { background-color: var(--card-bg); border: 1px solid var(--border-color); }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #map {
            height: 400px;
            width: 100%;
            border-radius: 0.75rem;
            border: 2px solid var(--color-coda);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-coda);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 1000;
            font-size: 14px;
            text-align: center;
            animation: slideUp 0.3s ease-out;
            max-width: 90%;
            white-space: normal;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .input-link {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .btn-buscar {
            background: var(--color-coda);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .info-badge {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 12px;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        
        .main-content {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .main-content.visible {
            opacity: 1;
        }
        
        /* Logo en el encabezado */
        .header-logo {
            width: 40px;
            height: 40px;
            background: #DE440D;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .header-logo svg {
            width: 24px;
            height: 24px;
            color: white;
        }
        
        /* Modal de ayuda para links cortos */
        .modal-ayuda {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        
        .modal-contenido {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            max-width: 90%;
            width: 320px;
            text-align: center;
            border: 2px solid var(--color-coda);
        }
        
        .modal-titulo {
            font-size: 20px;
            font-weight: bold;
            color: var(--color-coda);
            margin-bottom: 16px;
        }
        
        .modal-texto {
            font-size: 14px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        
        .modal-boton {
            background: var(--color-coda);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }
        
        .modal-boton-secundario {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        
        select, input {
            color: var(--text-primary);
        }
        
        option {
            color: #1e293b;
        }
        
        .dark-mode option {
            color: #1e293b;
            background: white;
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE CARGA CON LOGO CODA EXPRESS -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
        </div>
        <div class="splash-title">Coda Express</div>
        <div class="splash-subtitle">Delivery Rapido y Seguro</div>
        <div class="splash-loader"></div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div id="mainContent" class="main-content">
        <button class="theme-toggle" onclick="toggleTheme()">
            <i data-lucide="moon" id="themeIcon"></i>
            <span id="themeText">Modo oscuro</span>
        </button>

        <div class="max-w-4xl mx-auto p-4 md:p-8">
            <header class="flex items-center justify-between mb-8 mt-12">
                <div class="flex items-center gap-3">
                    <!-- LOGO EN EL ENCABEZADO (reemplaza el camión) -->
                    <div class="header-logo">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold" style="color: var(--color-coda);">Coda Express</h1>
                </div>
                <span class="text-xs font-medium bg-coda/10 text-coda px-2 py-1 rounded-full">En linea</span>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- COLUMNA IZQUIERDA -->
                <div class="space-y-6">
                    <div class="bg-card p-4 rounded-2xl shadow-sm">
                        <h2 class="text-lg font-semibold mb-4" style="color: var(--text-primary);">Ubicacion del Pedido</h2>
                        
                        <label class="block text-sm font-medium mb-2" style="color: var(--text-primary);">Link de Google Maps</label>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="mapsLink" class="input-link" placeholder="https://maps.app.goo.gl/... o link con @coordenadas">
                            <button onclick="procesarLink()" class="btn-buscar">Buscar</button>
                        </div>
                        
                        <div id="map" class="mt-4"></div>
                        <p class="text-xs mt-2" style="color: var(--text-primary);">* Toca el mapa para marcar la entrega</p>
                    </div>

                    <div class="bg-card p-6 rounded-2xl shadow-sm">
                        <h2 class="text-lg font-semibold mb-4" style="color: var(--text-primary);">Seleccionar Local</h2>
                        <select id="localSelect" class="w-full p-3 rounded-xl border" style="border-color: var(--border-color); background: var(--card-bg); color: var(--text-primary);">
                            <option value="cremita">La Cremita - Santo Domingo</option>
                            <option value="custom">Usar mi ubicacion actual</option>
                        </select>
                    </div>
                </div>

                <!-- COLUMNA DERECHA -->
                <div class="space-y-6">
                    <div class="bg-card p-6 rounded-2xl shadow-sm">
                        <h2 class="text-lg font-semibold mb-4" style="color: var(--text-primary);">Datos del Cliente</h2>
                        <input type="text" id="nombre" placeholder="Nombre" class="w-full p-3 rounded-xl border mb-3" style="border-color: var(--border-color); background: var(--card-bg); color: var(--text-primary);">
                        <input type="tel" id="telefono" placeholder="Telefono" class="w-full p-3 rounded-xl border" style="border-color: var(--border-color); background: var(--card-bg); color: var(--text-primary);">
                        <div class="mt-3 info-badge" id="direccionConfirmada">Esperando ubicacion...</div>
                    </div>

                    <div id="resultadoCard" class="bg-coda p-6 rounded-2xl text-white hidden">
                        <div class="text-3xl font-bold" id="costoFinal">$0.00</div>
                        <p id="distanciaTexto">Distancia: 0.0 km</p>
                        <button onclick="enviarWhatsApp()" class="w-full mt-4 bg-white text-coda font-bold py-3 rounded-xl">Enviar por WhatsApp</button>
                    </div>

                    <button onclick="calcular()" class="w-full bg-coda text-white font-bold py-4 rounded-2xl">Calcular Entrega</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDFR0mPU-jz-crPgioPus5UEdfeEZ90yk4&libraries=geometry,places&callback=initMap&v=weekly" async defer></script>

    <script>
        let map, markerRestaurante, markerCliente, geocoder;
        let restaurantePos = { lat: -0.245197, lng: -79.158230 };
        let clientePos = null;

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                const main = document.getElementById('mainContent');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    main.classList.add('visible');
                }, 500);
            }, 1500);
        });

        function mostrarNotificacion(msg) {
            let n = document.createElement('div');
            n.className = 'toast';
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        function mostrarModalAyuda(linkCorto) {
            const modal = document.createElement('div');
            modal.className = 'modal-ayuda';
            modal.innerHTML = `
                <div class="modal-contenido">
                    <div class="modal-titulo">Link corto detectado</div>
                    <div class="modal-texto">
                        Los links cortos de Google Maps no se pueden leer automáticamente.<br><br>
                        <strong>Pasos:</strong><br>
                        1. Abre el link en Google Maps<br>
                        2. Copia el link largo de la barra de direcciones<br>
                        3. Regresa y pégalo aquí
                    </div>
                    <button class="modal-boton" id="btnAbrirLink">Abrir en Google Maps</button>
                    <button class="modal-boton-secundario" id="btnCerrarModal">Cancelar</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('btnAbrirLink').onclick = () => {
                window.open(linkCorto, '_blank');
                modal.remove();
                mostrarNotificacion("Abre el link, copia la URL larga y pégala aquí");
            };
            
            document.getElementById('btnCerrarModal').onclick = () => {
                modal.remove();
            };
        }

        function extraerCoordenadasDeLink(link) {
            let texto = decodeURIComponent(link);
            
            let match = texto.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) {
                return { lat: parseFloat(match[1]), lng: parseFloat(match[2]), tipo: 'coordenadas' };
            }
            
            match = texto.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
            if (match) {
                return { lat: parseFloat(match[1]), lng: parseFloat(match[2]), tipo: 'coordenadas' };
            }
            
            match = texto.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) {
                return { lat: parseFloat(match[1]), lng: parseFloat(match[2]), tipo: 'coordenadas' };
            }
            
            match = texto.match(/\/place\/([^\/]+)/);
            if (match) {
                let direccion = match[1];
                direccion = direccion.replace(/\+/g, ' ');
                direccion = decodeURIComponent(direccion);
                return { direccion: direccion, tipo: 'texto' };
            }
            
            return null;
        }

        function buscarEnMapa(dato) {
            if (dato.lat && dato.lng) {
                let latLng = new google.maps.LatLng(dato.lat, dato.lng);
                map.setCenter(latLng);
                map.setZoom(18);
                setCliente(latLng);
                mostrarNotificacion("Ubicacion encontrada!");
                return true;
            }
            
            if (typeof dato === 'string' && dato.length > 2) {
                mostrarNotificacion("Buscando: " + dato);
                geocoder.geocode({ address: dato }, (results, status) => {
                    if (status === 'OK' && results[0]) {
                        let location = results[0].geometry.location;
                        map.setCenter(location);
                        map.setZoom(18);
                        setCliente(location);
                        mostrarNotificacion("Encontrado!");
                        document.getElementById('direccionConfirmada').innerHTML = dato;
                    } else {
                        mostrarNotificacion("No se encontro: " + dato);
                    }
                });
                return true;
            }
            return false;
        }

        function procesarLink() {
            let link = document.getElementById('mapsLink').value.trim();
            if (!link) {
                mostrarNotificacion("Pega un link de Google Maps");
                return;
            }
            
            if (link.includes('goo.gl') || link.includes('maps.app.goo.gl')) {
                mostrarModalAyuda(link);
                return;
            }
            
            mostrarNotificacion("Procesando link...");
            let info = extraerCoordenadasDeLink(link);
            
            if (info) {
                if (info.tipo === 'coordenadas') {
                    buscarEnMapa({ lat: info.lat, lng: info.lng });
                    document.getElementById('mapsLink').value = '';
                } else if (info.tipo === 'texto' && info.direccion) {
                    buscarEnMapa(info.direccion);
                    document.getElementById('mapsLink').value = '';
                }
            } else {
                mostrarNotificacion("No se pudo extraer la ubicacion");
            }
        }

        function initMap() {
            try {
                map = new google.maps.Map(document.getElementById("map"), {
                    center: restaurantePos,
                    zoom: 14,
                    gestureHandling: 'greedy'
                });
                geocoder = new google.maps.Geocoder();

                markerRestaurante = new google.maps.Marker({
                    position: restaurantePos,
                    map: map,
                    title: "La Cremita",
                    icon: 'http://maps.google.com/mapfiles/ms/icons/green-dot.png'
                });

                markerCliente = new google.maps.Marker({
                    position: null,
                    map: null,
                    title: "Cliente",
                    icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png',
                    draggable: true
                });
                markerCliente.addListener('dragend', () => {
                    let pos = markerCliente.getPosition();
                    clientePos = { lat: pos.lat(), lng: pos.lng() };
                });

                map.addListener("click", (e) => {
                    setCliente(e.latLng);
                    mostrarNotificacion("Ubicacion marcada");
                });

                document.getElementById('localSelect').addEventListener('change', function() {
                    if (this.value === 'cremita') {
                        restaurantePos = { lat: -0.245197, lng: -79.158230 };
                        markerRestaurante.setPosition(restaurantePos);
                        map.panTo(restaurantePos);
                    } else if (this.value === 'custom') {
                        navigator.geolocation.getCurrentPosition(
                            pos => {
                                restaurantePos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                                markerRestaurante.setPosition(restaurantePos);
                                map.setCenter(restaurantePos);
                                map.setZoom(16);
                            },
                            () => alert("No se pudo obtener ubicacion")
                        );
                    }
                });

                loadTheme();
                mostrarNotificacion("Mapa cargado");
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function setCliente(latLng) {
            markerCliente.setPosition(latLng);
            markerCliente.setMap(map);
            clientePos = { lat: latLng.lat(), lng: latLng.lng() };
            geocoder.geocode({ location: latLng }, (results) => {
                if (results && results[0]) {
                    document.getElementById('direccionConfirmada').innerHTML = results[0].formatted_address;
                }
            });
        }

        function calcular() {
            if (!clientePos) { alert("Marca la ubicacion en el mapa"); return; }
            let km = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(restaurantePos.lat, restaurantePos.lng),
                new google.maps.LatLng(clientePos.lat, clientePos.lng)
            ) / 1000;
            let total = 2.00;
            if (km > 1.4) {
                let segmentos = Math.ceil((km - 1.4) / 0.7);
                total = 2.00 + segmentos * 0.25;
            }
            total = Math.ceil(total * 4) / 4;
            let minutos = Math.round((km / 30) * 60);
            let tiempo = minutos < 60 ? minutos + " min" : Math.floor(minutos/60) + "h " + (minutos%60) + "min";
            document.getElementById('costoFinal').innerText = "$" + total.toFixed(2);
            document.getElementById('distanciaTexto').innerHTML = "Distancia: " + km.toFixed(2) + " km<br>Tiempo: " + tiempo;
            document.getElementById('resultadoCard').classList.remove('hidden');
        }

        function enviarWhatsApp() {
            if (!clientePos) return alert("Calcula el costo primero");
            let nombre = document.getElementById('nombre').value || "Cliente";
            let tel = document.getElementById('telefono').value || "No provisto";
            let costo = document.getElementById('costoFinal').innerText;
            let dist = document.getElementById('distanciaTexto').innerText;
            let local = document.getElementById('localSelect').options[document.getElementById('localSelect').selectedIndex].text;
            let maps = "https://www.google.com/maps?q=" + clientePos.lat + "," + clientePos.lng;
            let msg = "*NUEVO PEDIDO*%0A%0A*Local:* " + local + "%0A*Cliente:* " + nombre + "%0A*Telefono:* " + tel + "%0A%0A*Costo:* " + costo + "%0A*" + dist + "*%0A%0A*Ubicacion:* " + maps;
            window.open("https://wa.me/593959698463?text=" + msg, '_blank');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            let icon = document.getElementById('themeIcon');
            let text = document.getElementById('themeText');
            if (document.body.classList.contains('dark-mode')) {
                icon.setAttribute('data-lucide', 'sun');
                text.textContent = 'Modo claro';
                localStorage.setItem('theme', 'dark');
            } else {
                icon.setAttribute('data-lucide', 'moon');
                text.textContent = 'Modo oscuro';
                localStorage.setItem('theme', 'light');
            }
            lucide.createIcons();
        }

        function loadTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').setAttribute('data-lucide', 'sun');
                document.getElementById('themeText').textContent = 'Modo claro';
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
