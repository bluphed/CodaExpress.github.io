<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Coda Express - Calculadora de Delivery</title>

    <!-- MANIFEST -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Iconos -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png">
    <meta name="theme-color" content="#DE440D">
    
    <!-- Meta PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CodaExpress">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .bg-coda { background-color: #DE440D; }
        .text-coda { color: #DE440D; }
        .border-coda { border-color: #DE440D; }
        .hover-bg-coda:hover { background-color: #b8360a; }
        
        #map {
            height: 400px;
            width: 100%;
            border-radius: 0.75rem;
        }
        .btn-touch {
            min-height: 48px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #DE440D;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50">

    <div class="max-w-4xl mx-auto p-4">
        <!-- Encabezado -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-2">
                <div class="bg-coda p-2 rounded-lg text-white">
                    <i data-lucide="truck"></i>
                </div>
                <h1 class="text-2xl font-bold" style="color: #DE440D;">Coda Express</h1>
            </div>
            <span class="text-xs font-medium bg-orange-100 text-coda px-2 py-1 rounded-full">En línea</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Columna Izquierda -->
            <div>
                <div class="bg-white p-4 rounded-2xl shadow mb-6">
                    <h2 class="text-lg font-semibold mb-4">📍 Ubicación del Pedido</h2>
                    
                    <!-- Link de Google Maps -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium mb-2">🔗 Link de Google Maps</label>
                        <div class="flex gap-2">
                            <input type="text" id="mapsLink" placeholder="Ej: https://maps.app.goo.gl/..." 
                                   class="flex-1 p-3 rounded-xl border">
                            <button onclick="procesarLinkMaps(event)" 
                                    class="bg-coda text-white px-4 py-2 rounded-xl">
                                🔍
                            </button>
                        </div>
                    </div>
                    
                    <!-- Mapa -->
                    <div id="map" class="bg-gray-200 rounded-xl" style="height: 400px;"></div>
                    <p class="text-xs text-gray-400 mt-2">* Toca el mapa para marcar el punto de entrega</p>
                </div>

                <div class="bg-white p-4 rounded-2xl shadow">
                    <h2 class="text-lg font-semibold mb-4">🏪 Seleccionar Local</h2>
                    <select id="localSelect" class="w-full p-3 rounded-xl border">
                        <option value="cremita">🍦 La Cremita – Santo Domingo</option>
                        <option value="custom">📍 Usar mi ubicación</option>
                    </select>
                </div>
            </div>

            <!-- Columna Derecha -->
            <div>
                <div class="bg-white p-4 rounded-2xl shadow mb-6">
                    <h2 class="text-lg font-semibold mb-4">👤 Datos del Cliente</h2>
                    <input type="text" id="nombre" placeholder="Nombre" class="w-full p-3 rounded-xl border mb-3">
                    <input type="tel" id="telefono" placeholder="Teléfono" class="w-full p-3 rounded-xl border mb-3">
                    <textarea id="direccion" placeholder="Dirección" class="w-full p-3 rounded-xl border h-24"></textarea>
                </div>

                <!-- Resultado -->
                <div id="resultadoCard" class="bg-coda p-6 rounded-2xl text-white shadow hidden">
                    <div class="text-4xl font-bold mb-1" id="costoFinal">$0.00</div>
                    <p class="text-sm" id="distanciaTexto">Distancia: 0.0 km</p>
                    <button onclick="enviarWhatsApp()" class="w-full mt-4 bg-white text-coda font-bold py-3 rounded-xl">
                        📱 Enviar por WhatsApp
                    </button>
                </div>

                <button onclick="calcular()" class="w-full bg-coda text-white font-bold py-4 rounded-2xl mt-4">
                    🚚 Calcular Entrega
                </button>
            </div>
        </div>
    </div>

    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDFR0mPU-jz-crPgioPus5UEdfeEZ90yk4&libraries=geometry,places&callback=initMap" async defer></script>

    <script>
        // VARIABLES GLOBALES
        let map;
        let markerRestaurante;
        let markerCliente;
        let restaurantePos = { lat: -0.245197, lng: -79.158230 };
        let clientePos = null;
        let geocoder;

        const LOCALES = {
            cremita: { lat: -0.245197, lng: -79.158230, nombre: "La Cremita" }
        };

        // INICIALIZACIÓN
        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: restaurantePos,
                zoom: 14,
                gestureHandling: 'greedy'
            });

            geocoder = new google.maps.Geocoder();

            markerRestaurante = new google.maps.Marker({
                position: restaurantePos,
                map: map,
                title: "Local",
                icon: 'http://maps.google.com/mapfiles/ms/icons/green-dot.png'
            });

            map.addListener("click", (e) => {
                setCliente(e.latLng);
            });

            document.getElementById('localSelect').addEventListener('change', function() {
                const val = this.value;
                if (LOCALES[val]) {
                    restaurantePos = LOCALES[val];
                    markerRestaurante.setPosition(restaurantePos);
                    map.panTo(restaurantePos);
                }
            });

            lucide.createIcons();
        }

        function setCliente(latLng) {
            if (markerCliente) {
                markerCliente.setPosition(latLng);
            } else {
                markerCliente = new google.maps.Marker({
                    position: latLng,
                    map: map,
                    title: "Cliente",
                    icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png'
                });
            }
            clientePos = { lat: latLng.lat(), lng: latLng.lng() };
            
            geocoder.geocode({ location: latLng }, (results) => {
                if (results && results[0]) {
                    document.getElementById('direccion').value = results[0].formatted_address;
                }
            });
        }

        // FUNCIÓN PARA ENLACES CORTOS (AUTOMÁTICA)
        async function procesarLinkMaps(event) {
            const link = document.getElementById('mapsLink').value.trim();
            if (!link) {
                alert("❌ Pega un link");
                return;
            }

            const btn = event.currentTarget;
            btn.innerHTML = '<span class="loading"></span>';
            btn.disabled = true;

            try {
                // Seguir redirección
                const response = await fetch(link, { method: 'HEAD', redirect: 'follow' });
                const finalUrl = response.url;
                
                // Extraer coordenadas
                const coords = extraerCoordenadas(finalUrl);
                
                if (coords) {
                    const latLng = new google.maps.LatLng(coords.lat, coords.lng);
                    map.setCenter(latLng);
                    map.setZoom(18);
                    setCliente(latLng);
                    document.getElementById('mapsLink').value = '';
                    alert("✅ Ubicación encontrada");
                } else {
                    alert("❌ No se encontraron coordenadas");
                }
            } catch (error) {
                alert("❌ Error: " + error.message);
            } finally {
                btn.innerHTML = '🔍';
                btn.disabled = false;
            }
        }

        function extraerCoordenadas(url) {
            const match = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) {
                return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            }
            return null;
        }

        function calcular() {
            if (!clientePos) {
                alert("Marca el cliente en el mapa");
                return;
            }

            const dist = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(restaurantePos.lat, restaurantePos.lng),
                new google.maps.LatLng(clientePos.lat, clientePos.lng)
            );
            const km = (dist / 1000).toFixed(2);

            document.getElementById('costoFinal').innerText = '$2.50';
            document.getElementById('distanciaTexto').innerText = `Distancia: ${km} km`;
            document.getElementById('resultadoCard').classList.remove('hidden');
        }

        function enviarWhatsApp() {
            alert("WhatsApp: " + document.getElementById('nombre').value);
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
