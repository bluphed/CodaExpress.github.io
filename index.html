<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Delivery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Botón menú -->
    <div class="menuBtn" onclick="abrirMenu()">☰</div>
    
    <!-- Menú lateral -->
    <div id="menuLateral" class="menuLateral">
        <h3>Menú</h3>
        <p onclick="toggleLocales()">📋 Locales ▼</p>
        <div id="listaLocales" style="display:none;padding-left:10px;">
            <p onclick="seleccionarLocal(-0.25305, -79.1751)">
                🍦 La Cremita – Santo Domingo
            </p>
        </div>
        <p onclick="cerrarMenu()">✖ Cerrar menú</p>
    </div>
    
    <!-- Botones superiores -->
    <div class="topbar">
        <button onclick="modoRestaurante()">📍 Marcar Local</button>
        <button onclick="modoCliente()">👤 Marcar Cliente</button>
    </div>
    
    <!-- Contenido principal -->
    <div class="container">
        <div id="map"></div>
        
        <button class="mainbtn" onclick="calcular()">
            🚚 Calcular costo
        </button>
        
        <div id="resultado" class="resultado">
            Esperando cálculo...
        </div>
        
        <button class="mainbtn" onclick="enviarWhatsApp()">
            📱 Enviar por WhatsApp
        </button>
    </div>

    <script src="script.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDFR0mPU-jz-crPgioPus5UEdfeEZ90yk4&libraries=geometry&callback=initMap" async defer></script>
</body>
</html>
</html>
