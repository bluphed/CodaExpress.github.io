<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Coda Express - Calculadora de Delivery</title>

    <!-- MANIFEST - RUTA CORREGIDA -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Iconos para todos los dispositivos -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png">
    <meta name="theme-color" content="#DE440D">
    
    <!-- Meta para PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CodaExpress">
    
    <!-- Tailwind CSS con color personalizado -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Color personalizado #DE440D */
        .bg-coda { background-color: #DE440D; }
        .text-coda { color: #DE440D; }
        .border-coda { border-color: #DE440D; }
        .hover-bg-coda:hover { background-color: #b8360a; }
        .ring-coda:focus { --tw-ring-color: #DE440D; }
        
        #map {
            height: 400px;
            width: 100%;
            border-radius: 0.75rem;
            touch-action: pan-x pan-y;
            -webkit-overflow-scrolling: touch;
        }
        .custom-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .gesture-hint {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }
        .btn-touch {
            min-height: 48px;
            touch-action: manipulation;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #DE440D;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- Encabezado con color #DE440D -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-2">
                <div class="bg-coda p-2 rounded-lg text-white">
                    <i data-lucide="truck"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight" style="color: #DE440D;">Coda Express</h1>
            </div>
            <span class="text-xs font-medium" style="background-color: #fbe9e7; color: #DE440D; px-2 py-1 rounded-full;">En línea</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Columna Izquierda: Mapa y local -->
            <div class="space-y-6">
                <div class="bg-white p-4 rounded-2xl custom-shadow">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="map-pin" style="color: #DE440D;"></i>
                        Ubicación del Pedido
                    </h2>
                    
                    <!-- Link de Google Maps -->
                    <div class="mb-4 p-3 bg-slate-50 rounded-xl">
                        <label class="block text-sm font-medium text-slate-700 mb-2">
                            <i data-lucide="link" class="inline w-4 h-4 mr-1" style="color: #DE440D;"></i>
                            Link de Google Maps
                        </label>
                        <div class="flex gap-2">
                            <input type="text" id="mapsLink" placeholder="Ej: https://maps.app.goo.gl/..." 
                                   class="flex-1 p-3 rounded-xl border border-slate-200 focus:ring-2 outline-none text-sm"
                                   style="focus:ring-color: #DE440D;">
                            <button onclick="procesarLinkMaps(event)" 
                                    class="bg-coda text-white px-4 py-2 rounded-xl hover-bg-coda transition-colors btn-touch">
                                <i data-lucide="search" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <p class="text-xs text-slate-400 mt-1">Si el link no se lee automáticamente, te ayudaremos a obtener las coordenadas.</p>
                    </div>
                    
                    <!-- Mapa -->
                    <div class="map-container relative">
                        <div id="map" class="bg-slate-200"></div>
                        <div class="gesture-hint">
                            <i data-lucide="move" class="w-4 h-4"></i>
                            <span>Desliza para mover el mapa</span>
                        </div>
                    </div>
                    
                    <p class="text-xs text-slate-400 mt-2 italic">
                        * Toca el mapa para marcar el punto de entrega
                    </p>
                </div>

                <div class="bg-white p-6 rounded-2xl custom-shadow space-y-4">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <i data-lucide="store" style="color: #DE440D;"></i>
                        Seleccionar Local
                    </h2>
                    <select id="localSelect" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 outline-none btn-touch"
                            style="focus:ring-color: #DE440D;">
                        <option value="cremita">🍦 La Cremita – Santo Domingo</option>
                        <option value="custom">📍 Usar mi ubicación actual</option>
                    </select>
                </div>
            </div>

            <!-- Columna Derecha: Datos del cliente y resultado -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl custom-shadow space-y-4">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <i data-lucide="user" style="color: #DE440D;"></i>
                        Datos del Cliente
                    </h2>
                    <input type="text" id="nombre" placeholder="Nombre del cliente" 
                           class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 outline-none btn-touch"
                           style="focus:ring-color: #DE440D;">
                    <input type="tel" id="telefono" placeholder="Teléfono" 
                           class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 outline-none btn-touch"
                           style="focus:ring-color: #DE440D;">
                    <textarea id="direccion" placeholder="Dirección exacta (se llena automáticamente al marcar en el mapa)" 
                              class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 outline-none h-24"
                              style="focus:ring-color: #DE440D;"></textarea>
                </div>

                <!-- Tarjeta de resultado con color #DE440D -->
                <div id="resultadoCard" class="bg-coda p-6 rounded-2xl text-white custom-shadow hidden">
                    <div class="flex items-center gap-2 mb-3">
                        <i data-lucide="calculator" class="w-5 h-5 text-orange-200"></i>
                        <span class="text-orange-100 uppercase text-xs font-bold tracking-widest">Costo estimado</span>
                    </div>
                    <div class="text-4xl font-bold mb-1" id="costoFinal">$0.00</div>
                    <p class="text-sm text-orange-100" id="distanciaTexto">Distancia: 0.0 km</p>
                    <p class="text-xs text-orange-200 mt-2" id="detalleCosto"></p>
                    
                    <button onclick="enviarWhatsApp()" class="w-full mt-5 bg-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-orange-50 transition-colors btn-touch shadow-sm"
                            style="color: #DE440D;">
                        <i data-lucide="message-circle" class="w-5 h-5" style="color: #DE440D;"></i>
                        Enviar por WhatsApp
                    </button>
                </div>

                <button onclick="calcular()" class="w-full font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-lg active:scale-95 btn-touch text-white"
                        style="background-color: #DE440D; hover:background-color: #b8360a;">
                    <i data-lucide="navigation"></i>
                    Calcular Entrega
                </button>
            </div>
        </div>
    </div>

    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDFR0mPU-jz-crPgioPus5UEdfeEZ90yk4&libraries=geometry,places&callback=initMap" async defer></script>

    <script>
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        let map;
        let markerRestaurante;
        let markerCliente;
        // Coordenadas más precisas para La Cremita
        let restaurantePos = { lat: -0.245197, lng: -79.158230 };
        let clientePos = null;
        let geocoder;

        const LOCALES = {
            cremita: { lat: -0.245197, lng: -79.158230, nombre: "La Cremita" }
        };

        // ============================================
        // INICIALIZACIÓN DEL MAPA
        // ============================================
        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: restaurantePos,
                zoom: 14,
                gestureHandling: 'greedy',
                zoomControl: true,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: true,
                styles: [{ "featureType": "poi", "stylers": [{ "visibility": "off" }] }]
            });

            geocoder = new google.maps.Geocoder();

            markerRestaurante = new google.maps.Marker({
                position: restaurantePos,
                map: map,
                title: "Local",
                icon: 'http://maps.google.com/mapfiles/ms/icons/green-dot.png'
            });

            map.addListener("click", (e) => {
                setCliente(e.latLng);
            });

            document.getElementById('localSelect').addEventListener('change', function() {
                const val = this.value;
                if (LOCALES[val]) {
                    restaurantePos = LOCALES[val];
                    markerRestaurante.setPosition(restaurantePos);
                    map.panTo(restaurantePos);
                } else if (val === 'custom') {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                restaurantePos = {
                                    lat: position.coords.latitude,
                                    lng: position.coords.longitude
                                };
                                markerRestaurante.setPosition(restaurantePos);
                                map.setCenter(restaurantePos);
                                map.setZoom(16);
                            },
                            () => alert("No se pudo obtener tu ubicación")
                        );
                    }
                }
            });

            lucide.createIcons();
        }

        function setCliente(latLng) {
            if (markerCliente) {
                markerCliente.setPosition(latLng);
            } else {
                markerCliente = new google.maps.Marker({
                    position: latLng,
                    map: map,
                    title: "Cliente",
                    icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png',
                    draggable: true
                });
                markerCliente.addListener('dragend', function() {
                    const pos = markerCliente.getPosition();
                    clientePos = { lat: pos.lat(), lng: pos.lng() };
                    actualizarDireccion(pos);
                });
            }
            clientePos = { lat: latLng.lat(), lng: latLng.lng() };
            actualizarDireccion(latLng);
        }

        function actualizarDireccion(latLng) {
            geocoder.geocode({ location: latLng }, (results, status) => {
                if (status === "OK" && results[0]) {
                    document.getElementById('direccion').value = results[0].formatted_address;
                }
            });
        }

        function procesarLinkMaps(event) {
            const link = document.getElementById('mapsLink').value.trim();
            if (!link) {
                alert("❌ Por favor, pega un link de Google Maps");
                return;
            }

            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span>';
            btn.disabled = true;

            const inputField = document.getElementById('mapsLink');
            const originalPlaceholder = inputField.placeholder;
            inputField.placeholder = 'Procesando link...';

            extraerCoordenadasDeLink(link)
                .then(coords => {
                    if (coords) {
                        const latLng = new google.maps.LatLng(coords.lat, coords.lng);
                        map.setCenter(latLng);
                        map.setZoom(18);
                        setCliente(latLng);
                        inputField.value = '';
                        inputField.placeholder = originalPlaceholder;
                        alert("✅ Ubicación encontrada y marcada en el mapa");
                    } else {
                        inputField.placeholder = originalPlaceholder;
                        const userConfirmed = confirm(
                            "❌ No se pudo leer el link automáticamente.\n\n" +
                            "¿Quieres abrir el enlace en una nueva pestaña para copiar las coordenadas manualmente?\n" +
                            "(Luego puedes copiar las coordenadas @lat,lng de la barra de direcciones)"
                        );
                        if (userConfirmed) {
                            window.open(link, '_blank');
                        }
                    }
                })
                .catch(error => {
                    console.error("Error:", error);
                    inputField.placeholder = originalPlaceholder;
                    alert("❌ Error al procesar el link: " + error.message);
                })
                .finally(() => {
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                });
        }

        async function extraerCoordenadasDeLink(link) {
            try {
                const response = await fetch(link, { method: 'HEAD', redirect: 'follow' });
                const finalUrl = response.url;
                console.log("URL final:", finalUrl);
                const coords = extraerCoordenadasDeUrl(finalUrl);
                if (coords) return coords;
            } catch (error) {
                console.warn("No se pudo seguir redirección, intentando extraer del link original:", error);
            }
            return extraerCoordenadasDeUrl(link);
        }

        function extraerCoordenadasDeUrl(url) {
            const patrones = [
                /@(-?\d+\.\d+),(-?\d+\.\d+)/,
                /[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/,
                /\/place\/[^@]*@(-?\d+\.\d+),(-?\d+\.\d+)/,
                /!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/,
                /[?&]ll=(-?\d+\.\d+),(-?\d+\.\d+)/,
                /[?&]center=(-?\d+\.\d+),(-?\d+\.\d+)/
            ];
            for (let patron of patrones) {
                const match = url.match(patron);
                if (match) {
                    return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
                }
            }
            return null;
        }

        function calcular() {
            if (!clientePos) {
                alert("Por favor, marca la ubicación del cliente en el mapa.");
                return;
            }

            const dist = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(restaurantePos.lat, restaurantePos.lng),
                new google.maps.LatLng(clientePos.lat, clientePos.lng)
            );
            const km = dist / 1000;

            let total = 2.00;
            let detalle = "Base $2.00 (1.4 km)";
            
            if (km > 1.4) {
                const kmExtras = km - 1.4;
                const segmentos = Math.ceil(kmExtras / 0.7);
                const extraTotal = segmentos * 0.25;
                total = 2.00 + extraTotal;
                detalle = `Base + ${segmentos}×700m → $${extraTotal.toFixed(2)} extra`;
            }

            total = Math.ceil(total * 4) / 4;

            document.getElementById('costoFinal').innerText = `$${total.toFixed(2)}`;
            document.getElementById('distanciaTexto').innerText = `Distancia: ${km.toFixed(2)} km`;
            document.getElementById('detalleCosto').innerText = detalle;
            document.getElementById('resultadoCard').classList.remove('hidden');
            document.getElementById('resultadoCard').scrollIntoView({ behavior: 'smooth' });
        }

        function enviarWhatsApp() {
            if (!clientePos) {
                alert("Primero debes calcular el costo.");
                return;
            }
            const nombre = document.getElementById('nombre').value || "Cliente";
            const tel = document.getElementById('telefono').value || "No provisto";
            const dir = document.getElementById('direccion').value || "Ver mapa";
            const costo = document.getElementById('costoFinal').innerText;
            const dist = document.getElementById('distanciaTexto').innerText;
            const detalle = document.getElementById('detalleCosto').innerText;
            
            const localSelect = document.getElementById('localSelect');
            const localName = localSelect.options[localSelect.selectedIndex].text;

            const mapsLink = `https://www.google.com/maps?q=${clientePos.lat},${clientePos.lng}`;

            const mensaje = `*NUEVO PEDIDO DELIVERY*%0A%0A` +
                `*Local:* ${localName}%0A` +
                `*Cliente:* ${nombre}%0A` +
                `*Teléfono:* ${tel}%0A` +
                `*Dirección:* ${dir}%0A%0A` +
                `*Costo:* ${costo}%0A` +
                `*${dist}*%0A` +
                `*Detalle:* ${detalle}%0A%0A` +
                `*Ubicación en Maps:* ${mapsLink}`;

            window.open(`https://wa.me/593959698463?text=${mensaje}`, '_blank');
        }

        window.addEventListener('load', function() {
            if (markerCliente) {
                markerCliente.setMap(null);
                markerCliente = null;
            }
            clientePos = null;
            restaurantePos = LOCALES.cremita;
            if (markerRestaurante) {
                markerRestaurante.setPosition(restaurantePos);
            }
            document.getElementById('nombre').value = '';
            document.getElementById('telefono').value = '';
            document.getElementById('direccion').value = '';
            document.getElementById('mapsLink').value = '';
            document.getElementById('resultadoCard').classList.add('hidden');
            if (map) {
                map.setCenter(restaurantePos);
                map.setZoom(14);
            }
            console.log("Página refrescada correctamente");
            
            // Registrar Service Worker (ruta correcta)
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ Service Worker registrado:', reg.scope))
                    .catch(err => console.log('❌ Error al registrar Service Worker:', err));
            }
        });
    </script>

    <!-- Este script ya no es necesario porque está dentro del load -->
    
</body>
</html>
