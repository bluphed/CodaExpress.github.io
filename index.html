<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Coda Express - Calculadora de Delivery</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --color-coda: #DE440D;
            --bg-primary: #f8fafc;
            --text-primary: #1e293b;
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
        }

        .dark-mode {
            --bg-primary: #0f172a;
            --text-primary: #f1f5f9;
            --border-color: #334155;
            --card-bg: #1e293b;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
            font-family: system-ui, sans-serif;
        }

        .bg-coda { background-color: var(--color-coda); }
        .text-coda { color: var(--color-coda); }
        .bg-card { background-color: var(--card-bg); border: 1px solid var(--border-color); }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #map { height: 400px; width: 100%; border-radius: 0.75rem; border: 2px solid var(--color-coda); }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-coda);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 1000;
            font-size: 14px;
            text-align: center;
            white-space: nowrap;
        }

        .input-link {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text-primary);
        }
        
        .btn-buscar {
            background: var(--color-coda);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        
        .info-badge {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 12px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">
        <i data-lucide="moon" id="themeIcon"></i>
        <span id="themeText">Modo oscuro</span>
    </button>

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <header class="flex items-center justify-between mb-8 mt-12">
            <div class="flex items-center gap-2">
                <div class="bg-coda p-2 rounded-lg text-white"><i data-lucide="truck"></i></div>
                <h1 class="text-2xl font-bold" style="color: var(--color-coda);">Coda Express</h1>
            </div>
            <span class="text-xs font-medium bg-coda/10 text-coda px-2 py-1 rounded-full">En línea</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- COLUMNA IZQUIERDA -->
            <div class="space-y-6">
                <div class="bg-card p-4 rounded-2xl shadow-sm">
                    <h2 class="text-lg font-semibold mb-4">📍 Ubicación del Pedido</h2>
                    
                    <label class="block text-sm font-medium mb-2">🔗 Link de Google Maps</label>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="mapsLink" class="input-link" placeholder="https://maps.app.goo.gl/...">
                        <button onclick="procesarLink()" class="btn-buscar">Buscar</button>
                    </div>
                    
                    <label class="block text-sm font-medium mb-2">📝 O escribe la dirección</label>
                    <input type="text" id="searchAddress" class="input-link" placeholder="Ej: Jose de la Cuadra 218, Santo Domingo">
                    
                    <div id="map" class="mt-4"></div>
                    <p class="text-xs mt-2">* Toca el mapa para marcar la entrega</p>
                </div>

                <div class="bg-card p-6 rounded-2xl shadow-sm">
                    <h2 class="text-lg font-semibold mb-4">🏪 Seleccionar Local</h2>
                    <select id="localSelect" class="w-full p-3 rounded-xl border">
                        <option value="cremita">🍦 La Cremita – Santo Domingo</option>
                        <option value="custom">📍 Usar mi ubicación actual</option>
                    </select>
                </div>
            </div>

            <!-- COLUMNA DERECHA -->
            <div class="space-y-6">
                <div class="bg-card p-6 rounded-2xl shadow-sm">
                    <h2 class="text-lg font-semibold mb-4">👤 Datos del Cliente</h2>
                    <input type="text" id="nombre" placeholder="Nombre" class="w-full p-3 rounded-xl border mb-3">
                    <input type="tel" id="telefono" placeholder="Teléfono" class="w-full p-3 rounded-xl border">
                    <div class="mt-3 info-badge" id="direccionConfirmada">📍 Esperando ubicación...</div>
                </div>

                <div id="resultadoCard" class="bg-coda p-6 rounded-2xl text-white hidden">
                    <div class="text-3xl font-bold" id="costoFinal">$0.00</div>
                    <p id="distanciaTexto">Distancia: 0.0 km</p>
                    <button onclick="enviarWhatsApp()" class="w-full mt-4 bg-white text-coda font-bold py-3 rounded-xl">📱 Enviar por WhatsApp</button>
                </div>

                <button onclick="calcular()" class="w-full bg-coda text-white font-bold py-4 rounded-2xl">🚚 Calcular Entrega</button>
            </div>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDFR0mPU-jz-crPgioPus5UEdfeEZ90yk4&libraries=geometry,places&callback=initMap&v=weekly" async defer></script>

    <script>
        let map, markerRestaurante, markerCliente, geocoder, searchBox;
        let restaurantePos = { lat: -0.245197, lng: -79.158230 };
        let clientePos = null;

        function mostrarNotificacion(msg) {
            let n = document.createElement('div');
            n.className = 'toast';
            n.textContent = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        // ==========================================
        // FUNCIÓN CLAVE: Extraer dirección del link
        // ==========================================
        function extraerDireccionDelLink(link) {
            // Decodificar el link
            let texto = decodeURIComponent(link);
            
            // Buscar formato /place/NOMBRE
            let match = texto.match(/\/place\/([^\/]+)/);
            if (match) {
                let lugar = match[1].replace(/\+/g, ' ').replace(/%20/g, ' ');
                // Limpiar caracteres especiales
                lugar = lugar.replace(/[0-9a-f]{2}/g, '').replace(/%/g, '');
                return lugar;
            }
            
            // Buscar coordenadas @lat,lng
            match = texto.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) {
                return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            }
            
            return null;
        }

        // ==========================================
        // BUSCAR EN MAPA
        // ==========================================
        function buscarEnMapa(dato) {
            if (dato.lat && dato.lng) {
                let latLng = new google.maps.LatLng(dato.lat, dato.lng);
                map.setCenter(latLng);
                map.setZoom(18);
                setCliente(latLng);
                mostrarNotificacion("✅ Ubicación encontrada!");
                return true;
            }
            
            if (typeof dato === 'string' && dato.length > 2) {
                mostrarNotificacion("🔍 Buscando: " + dato);
                geocoder.geocode({ address: dato }, (results, status) => {
                    if (status === 'OK' && results[0]) {
                        let location = results[0].geometry.location;
                        map.setCenter(location);
                        map.setZoom(18);
                        setCliente(location);
                        mostrarNotificacion("✅ Encontrado: " + dato);
                        document.getElementById('direccionConfirmada').innerHTML = `📍 ${dato}`;
                    } else {
                        mostrarNotificacion("❌ No se encontró: " + dato);
                    }
                });
                return true;
            }
            return false;
        }

        // ==========================================
        // PROCESAR LINK
        // ==========================================
        function procesarLink() {
            let link = document.getElementById('mapsLink').value.trim();
            if (!link) {
                mostrarNotificacion("❌ Pega un link");
                return;
            }
            
            mostrarNotificacion("🔍 Procesando link...");
            
            // Extraer dirección
            let direccion = extraerDireccionDelLink(link);
            
            if (direccion) {
                // Llenar el campo de búsqueda con la dirección extraída
                document.getElementById('searchAddress').value = direccion;
                buscarEnMapa(direccion);
                document.getElementById('mapsLink').value = '';
            } else {
                mostrarNotificacion("⚠️ No se pudo extraer la dirección");
                mostrarNotificacion("💡 Escribe la dirección manualmente en el campo de abajo");
            }
        }

        // ==========================================
        // CONFIGURAR BÚSQUEDA POR DIRECCIÓN
        // ==========================================
        function setupSearchBox() {
            let input = document.getElementById('searchAddress');
            searchBox = new google.maps.places.Autocomplete(input, {
                types: ['address'],
                componentRestrictions: { country: 'ec' }
            });
            searchBox.addListener('place_changed', () => {
                let place = searchBox.getPlace();
                if (place && place.geometry) {
                    let latLng = place.geometry.location;
                    map.setCenter(latLng);
                    map.setZoom(18);
                    setCliente(latLng);
                    mostrarNotificacion("✅ Dirección encontrada!");
                }
            });
        }

        // ==========================================
        // MAPA
        // ==========================================
        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: restaurantePos,
                zoom: 14,
                gestureHandling: 'greedy'
            });
            geocoder = new google.maps.Geocoder();

            markerRestaurante = new google.maps.Marker({
                position: restaurantePos,
                map: map,
                title: "La Cremita",
                icon: 'http://maps.google.com/mapfiles/ms/icons/green-dot.png'
            });

            markerCliente = new google.maps.Marker({
                position: null,
                map: null,
                title: "Cliente",
                icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png',
                draggable: true
            });
            markerCliente.addListener('dragend', () => {
                let pos = markerCliente.getPosition();
                clientePos = { lat: pos.lat(), lng: pos.lng() };
                mostrarNotificacion("📍 Ubicación ajustada");
            });

            map.addListener("click", (e) => {
                setCliente(e.latLng);
                mostrarNotificacion("📍 Ubicación marcada");
            });

            document.getElementById('localSelect').addEventListener('change', function() {
                if (this.value === 'cremita') {
                    restaurantePos = { lat: -0.245197, lng: -79.158230 };
                    markerRestaurante.setPosition(restaurantePos);
                    map.panTo(restaurantePos);
                } else if (this.value === 'custom') {
                    navigator.geolocation.getCurrentPosition(
                        pos => {
                            restaurantePos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                            markerRestaurante.setPosition(restaurantePos);
                            map.setCenter(restaurantePos);
                            map.setZoom(16);
                        },
                        () => alert("No se pudo obtener ubicación")
                    );
                }
            });

            setupSearchBox();
            loadTheme();
        }

        function setCliente(latLng) {
            markerCliente.setPosition(latLng);
            markerCliente.setMap(map);
            clientePos = { lat: latLng.lat(), lng: latLng.lng() };
            geocoder.geocode({ location: latLng }, (results) => {
                if (results && results[0]) {
                    document.getElementById('direccionConfirmada').innerHTML = `📍 ${results[0].formatted_address}`;
                }
            });
        }

        function calcular() {
            if (!clientePos) { alert("Marca la ubicación en el mapa"); return; }
            let km = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(restaurantePos.lat, restaurantePos.lng),
                new google.maps.LatLng(clientePos.lat, clientePos.lng)
            ) / 1000;
            let total = 2.00;
            if (km > 1.4) {
                let segmentos = Math.ceil((km - 1.4) / 0.7);
                total = 2.00 + segmentos * 0.25;
            }
            total = Math.ceil(total * 4) / 4;
            let minutos = Math.round((km / 30) * 60);
            let tiempo = minutos < 60 ? `${minutos} min` : `${Math.floor(minutos/60)}h ${minutos%60}min`;
            document.getElementById('costoFinal').innerText = `$${total.toFixed(2)}`;
            document.getElementById('distanciaTexto').innerHTML = `Distancia: ${km.toFixed(2)} km<br>Tiempo: ${tiempo}`;
            document.getElementById('resultadoCard').classList.remove('hidden');
        }

        function enviarWhatsApp() {
            if (!clientePos) return alert("Calcula el costo primero");
            let nombre = document.getElementById('nombre').value || "Cliente";
            let tel = document.getElementById('telefono').value || "No provisto";
            let costo = document.getElementById('costoFinal').innerText;
            let dist = document.getElementById('distanciaTexto').innerText;
            let local = document.getElementById('localSelect').options[document.getElementById('localSelect').selectedIndex].text;
            let maps = `https://www.google.com/maps?q=${clientePos.lat},${clientePos.lng}`;
            let msg = `*NUEVO PEDIDO*%0A%0A*Local:* ${local}%0A*Cliente:* ${nombre}%0A*Teléfono:* ${tel}%0A%0A*Costo:* ${costo}%0A*${dist}*%0A%0A*Ubicación:* ${maps}`;
            window.open(`https://wa.me/593959698463?text=${msg}`, '_blank');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            let icon = document.getElementById('themeIcon');
            let text = document.getElementById('themeText');
            if (document.body.classList.contains('dark-mode')) {
                icon.setAttribute('data-lucide', 'sun');
                text.textContent = 'Modo claro';
                localStorage.setItem('theme', 'dark');
            } else {
                icon.setAttribute('data-lucide', 'moon');
                text.textContent = 'Modo oscuro';
                localStorage.setItem('theme', 'light');
            }
            lucide.createIcons();
        }

        function loadTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').setAttribute('data-lucide', 'sun');
                document.getElementById('themeText').textContent = 'Modo claro';
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
