<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Coda Express - Calculadora de Delivery</title>

    <!-- MANIFEST -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Iconos -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png">
    <meta name="theme-color" content="#DE440D" id="themeColor">
    
    <!-- Meta PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CodaExpress">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --color-coda: #DE440D;
            --bg-primary: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
        }

        .dark-mode {
            --bg-primary: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
            --card-bg: #1e293b;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
            font-family: system-ui, sans-serif;
        }

        .bg-coda { background-color: var(--color-coda); }
        .text-coda { color: var(--color-coda); }
        
        .bg-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        #map {
            height: 400px;
            width: 100%;
            border-radius: 0.75rem;
            border: 2px solid var(--color-coda);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .time-badge {
            background: var(--color-coda);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-coda);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* iframe oculto para redirecciones */
        #hiddenFrame {
            display: none;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
        <i data-lucide="moon" id="themeIcon"></i>
        <span id="themeText">Modo oscuro</span>
    </button>

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <header class="flex items-center justify-between mb-8 mt-12 md:mt-0">
            <div class="flex items-center gap-2">
                <div class="bg-coda p-2 rounded-lg text-white">
                    <i data-lucide="truck"></i>
                </div>
                <h1 class="text-2xl font-bold" style="color: var(--color-coda);">Coda Express</h1>
            </div>
            <span class="text-xs font-medium bg-coda/10 text-coda px-2 py-1 rounded-full">En línea</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- COLUMNA IZQUIERDA -->
            <div class="space-y-6">
                <div class="bg-card p-4 rounded-2xl shadow-sm">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="map-pin" style="color: var(--color-coda);"></i>
                        Ubicación del Pedido
                    </h2>
                    
                    <!-- Input de link con detección automática -->
                    <div class="mb-4 p-3 bg-card rounded-xl">
                        <label class="block text-sm font-medium text-secondary mb-2">
                            <i data-lucide="link" style="color: var(--color-coda);"></i>
                            Link de Google Maps
                        </label>
                        <div class="flex gap-2">
                            <input type="text" id="mapsLink" 
                                   placeholder="Pega aquí el link (se procesa automáticamente)" 
                                   class="flex-1 p-3 rounded-xl border border-custom bg-card text-primary focus:ring-2 outline-none text-sm">
                            <button onclick="procesarLinkManual()" 
                                    class="bg-coda text-white px-4 py-2 rounded-xl hover:opacity-90">
                                <i data-lucide="search" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <p class="text-xs text-secondary mt-1">
                            ✅ <strong>Pega automático:</strong> solo copia el link y se procesa solo
                        </p>
                    </div>
                    
                    <!-- Mapa -->
                    <div class="relative">
                        <div id="map" class="bg-gray-200 rounded-xl" style="height: 400px;"></div>
                        <div class="absolute bottom-2 left-2 bg-black/50 text-white px-3 py-1 rounded-full text-xs">
                            📍 Arrastra para mover
                        </div>
                    </div>
                    <p class="text-xs text-secondary mt-2">* Toca el mapa para marcar la entrega</p>
                </div>

                <div class="bg-card p-6 rounded-2xl shadow-sm">
                    <h2 class="text-lg font-semibold flex items-center gap-2 mb-4">
                        <i data-lucide="store" style="color: var(--color-coda);"></i>
                        Seleccionar Local
                    </h2>
                    <select id="localSelect" class="w-full p-3 rounded-xl border border-custom bg-card text-primary focus:ring-2 outline-none">
                        <option value="cremita">🍦 La Cremita – Santo Domingo</option>
                        <option value="custom">📍 Usar mi ubicación actual</option>
                    </select>
                </div>
            </div>

            <!-- COLUMNA DERECHA -->
            <div class="space-y-6">
                <div class="bg-card p-6 rounded-2xl shadow-sm">
                    <h2 class="text-lg font-semibold flex items-center gap-2 mb-4">
                        <i data-lucide="user" style="color: var(--color-coda);"></i>
                        Datos del Cliente
                    </h2>
                    <input type="text" id="nombre" placeholder="Nombre del cliente" 
                           class="w-full p-3 rounded-xl border border-custom bg-card text-primary focus:ring-2 outline-none mb-3">
                    <input type="tel" id="telefono" placeholder="Teléfono" 
                           class="w-full p-3 rounded-xl border border-custom bg-card text-primary focus:ring-2 outline-none">
                </div>

                <div id="resultadoCard" class="bg-coda p-6 rounded-2xl text-white shadow-lg hidden fade-in">
                    <div class="flex items-center gap-2 mb-4">
                        <i data-lucide="clock"></i>
                        <span class="uppercase text-xs font-bold tracking-widest">Costo y tiempo</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <div class="text-3xl font-bold" id="costoFinal">$0.00</div>
                            <p class="text-xs text-white/80">Costo estimado</p>
                        </div>
                        <div class="text-right">
                            <div class="time-badge ml-auto" id="tiempoEstimado">
                                <i data-lucide="clock"></i>
                                <span>Calculando...</span>
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-white/20 pt-4">
                        <p class="text-sm" id="distanciaTexto">Distancia: 0.0 km</p>
                        <p class="text-xs text-white/80 mt-1" id="detalleCosto"></p>
                    </div>
                    <button onclick="enviarWhatsApp()" class="w-full mt-5 bg-white text-coda font-bold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-white/90">
                        <i data-lucide="message-circle"></i>
                        Enviar por WhatsApp
                    </button>
                </div>

                <button onclick="calcular()" class="w-full bg-coda text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 hover:opacity-90">
                    <i data-lucide="navigation"></i>
                    Calcular Entrega
                </button>
            </div>
        </div>
    </div>

    <!-- iframe oculto para seguir redirecciones (evita CORS) -->
    <iframe id="hiddenFrame" style="display:none"></iframe>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDFR0mPU-jz-crPgioPus5UEdfeEZ90yk4&libraries=geometry,places&callback=initMap&v=weekly" async defer></script>

    <script>
        // ==========================================
        // VARIABLES GLOBALES
        // ==========================================
        let map;
        let markerRestaurante;
        let markerCliente;
        let restaurantePos = { lat: -0.245197, lng: -79.158230 };
        let clientePos = null;
        let geocoder;
        let pendingLink = null;

        // ==========================================
        // NOTIFICACIONES FLOTANTES
        // ==========================================
        function mostrarNotificacion(mensaje) {
            const notif = document.createElement('div');
            notif.className = 'toast';
            notif.textContent = mensaje;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // ==========================================
        // DETECTAR PEGADO AUTOMÁTICO
        // ==========================================
        function setupPasteDetection() {
            const input = document.getElementById('mapsLink');
            input.addEventListener('paste', function(e) {
                setTimeout(async () => {
                    const link = input.value.trim();
                    if (link && (link.includes('google.com') || link.includes('goo.gl') || link.includes('maps.app'))) {
                        mostrarNotificacion("🔍 Link detectado, procesando...");
                        await procesarLinkConIframe(link);
                    }
                }, 100);
            });
        }

        // ==========================================
        // PROCESAR LINK CON IFRAME (EVITA CORS)
        // ==========================================
        async function procesarLinkConIframe(link) {
            // Primero intentar extraer coordenadas directamente del link
            let coords = extraerCoordenadas(link);
            if (coords) {
                moverMapaACoordenadas(coords);
                return;
            }
            
            // Si es link corto, usar iframe para seguir redirección
            if (link.includes('goo.gl') || link.includes('maps.app.goo.gl')) {
                mostrarNotificacion("🔄 Expandiendo link corto...");
                pendingLink = link;
                
                // Crear un iframe que cargue el link
                const iframe = document.getElementById('hiddenFrame');
                
                // Escuchar cuando el iframe termine de cargar
                iframe.onload = function() {
                    try {
                        // Intentar obtener la URL actual del iframe (después de redirección)
                        let finalUrl;
                        try {
                            finalUrl = iframe.contentWindow.location.href;
                        } catch(e) {
                            // Por seguridad, no se puede acceder directamente
                            console.log("No se puede acceder a la URL del iframe por seguridad");
                            mostrarNotificacion("❌ No se pudo expandir el link automáticamente");
                            window.open(link, '_blank');
                            return;
                        }
                        
                        if (finalUrl && finalUrl !== pendingLink) {
                            console.log("URL final del iframe:", finalUrl);
                            const coordsFinal = extraerCoordenadas(finalUrl);
                            if (coordsFinal) {
                                moverMapaACoordenadas(coordsFinal);
                                document.getElementById('mapsLink').value = '';
                            } else {
                                mostrarNotificacion("❌ No se encontraron coordenadas");
                            }
                        }
                    } catch(e) {
                        console.error("Error al leer iframe:", e);
                        mostrarNotificacion("⚠️ No se pudo procesar, abriendo en nueva pestaña");
                        window.open(link, '_blank');
                    }
                    iframe.onload = null;
                };
                
                // Cargar el link en el iframe
                iframe.src = link;
                
                // Timeout por si tarda demasiado
                setTimeout(() => {
                    if (iframe.onload) {
                        iframe.onload = null;
                        mostrarNotificacion("⚠️ Tiempo de espera agotado");
                        window.open(link, '_blank');
                    }
                }, 5000);
            } else {
                // Links largos normales
                coords = extraerCoordenadas(link);
                if (coords) {
                    moverMapaACoordenadas(coords);
                } else {
                    mostrarNotificacion("❌ No se encontraron coordenadas en el link");
                }
            }
        }

        // ==========================================
        // MOVER MAPA A COORDENADAS
        // ==========================================
        function moverMapaACoordenadas(coords) {
            const latLng = new google.maps.LatLng(coords.lat, coords.lng);
            map.setCenter(latLng);
            map.setZoom(18);
            setCliente(latLng);
            mostrarNotificacion("✅ Ubicación encontrada!");
        }

        // ==========================================
        // PROCESAR LINK MANUAL (BOTÓN)
        // ==========================================
        async function procesarLinkManual() {
            const link = document.getElementById('mapsLink').value.trim();
            if (!link) {
                mostrarNotificacion("❌ Pega un link de Google Maps");
                return;
            }
            await procesarLinkConIframe(link);
        }

        // ==========================================
        // EXTRAER COORDENADAS DE URL
        // ==========================================
        function extraerCoordenadas(url) {
            const patrones = [
                /@(-?\d+\.\d+),(-?\d+\.\d+)/,
                /!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/,
                /[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/,
                /[?&]ll=(-?\d+\.\d+),(-?\d+\.\d+)/
            ];
            
            for (let patron of patrones) {
                const match = url.match(patron);
                if (match) {
                    const lat = parseFloat(match[1]);
                    const lng = parseFloat(match[2]);
                    if (!isNaN(lat) && !isNaN(lng)) {
                        return { lat, lng };
                    }
                }
            }
            return null;
        }

        // ==========================================
        // TEMA OSCURO
        // ==========================================
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                icon.setAttribute('data-lucide', 'sun');
                text.textContent = 'Modo claro';
                localStorage.setItem('theme', 'dark');
            } else {
                icon.setAttribute('data-lucide', 'moon');
                text.textContent = 'Modo oscuro';
                localStorage.setItem('theme', 'light');
            }
            lucide.createIcons();
        }

        function loadTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeIcon').setAttribute('data-lucide', 'sun');
                document.getElementById('themeText').textContent = 'Modo claro';
            }
            lucide.createIcons();
        }

        // ==========================================
        // MAPA
        // ==========================================
        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: restaurantePos,
                zoom: 14,
                gestureHandling: 'greedy'
            });

            geocoder = new google.maps.Geocoder();

            markerRestaurante = new google.maps.Marker({
                position: restaurantePos,
                map: map,
                title: "La Cremita",
                icon: 'http://maps.google.com/mapfiles/ms/icons/green-dot.png'
            });

            map.addListener("click", (e) => setCliente(e.latLng));

            document.getElementById('localSelect').addEventListener('change', function() {
                if (this.value === 'cremita') {
                    restaurantePos = { lat: -0.245197, lng: -79.158230 };
                    markerRestaurante.setPosition(restaurantePos);
                    map.panTo(restaurantePos);
                } else if (this.value === 'custom') {
                    navigator.geolocation.getCurrentPosition(
                        pos => {
                            restaurantePos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                            markerRestaurante.setPosition(restaurantePos);
                            map.setCenter(restaurantePos);
                            map.setZoom(16);
                        },
                        () => alert("No se pudo obtener ubicación")
                    );
                }
            });

            loadTheme();
            setupPasteDetection();
        }

        function setCliente(latLng) {
            if (markerCliente) {
                markerCliente.setPosition(latLng);
            } else {
                markerCliente = new google.maps.Marker({
                    position: latLng,
                    map: map,
                    title: "Cliente",
                    icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png',
                    draggable: true
                });
                markerCliente.addListener('dragend', () => {
                    clientePos = { lat: markerCliente.getPosition().lat(), lng: markerCliente.getPosition().lng() };
                });
            }
            clientePos = { lat: latLng.lat(), lng: latLng.lng() };
        }

        // ==========================================
        // CALCULAR COSTO
        // ==========================================
        function calcular() {
            if (!clientePos) {
                alert("Marca la ubicación en el mapa");
                return;
            }

            const km = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(restaurantePos.lat, restaurantePos.lng),
                new google.maps.LatLng(clientePos.lat, clientePos.lng)
            ) / 1000;

            let total = 2.00;
            let detalle = "Base $2.00 (1.4 km)";
            
            if (km > 1.4) {
                const extras = km - 1.4;
                const segmentos = Math.ceil(extras / 0.7);
                const extraTotal = segmentos * 0.25;
                total = 2.00 + extraTotal;
                detalle = `Base + ${segmentos}×700m → +$${extraTotal.toFixed(2)}`;
            }
            total = Math.ceil(total * 4) / 4;

            const minutos = Math.round((km / 30) * 60);
            const tiempo = minutos < 60 ? `${minutos} min` : `${Math.floor(minutos/60)}h ${minutos%60}min`;

            document.getElementById('costoFinal').innerText = `$${total.toFixed(2)}`;
            document.getElementById('distanciaTexto').innerText = `Distancia: ${km.toFixed(2)} km`;
            document.getElementById('detalleCosto').innerText = detalle;
            document.getElementById('tiempoEstimado').innerHTML = `<i data-lucide="clock"></i> <span>${tiempo}</span>`;
            document.getElementById('resultadoCard').classList.remove('hidden');
            lucide.createIcons();
        }

        // ==========================================
        // WHATSAPP
        // ==========================================
        function enviarWhatsApp() {
            if (!clientePos) return alert("Calcula el costo primero");
            
            const nombre = document.getElementById('nombre').value || "Cliente";
            const tel = document.getElementById('telefono').value || "No provisto";
            const costo = document.getElementById('costoFinal').innerText;
            const dist = document.getElementById('distanciaTexto').innerText;
            const local = document.getElementById('localSelect').options[document.getElementById('localSelect').selectedIndex].text;
            const maps = `https://www.google.com/maps?q=${clientePos.lat},${clientePos.lng}`;
            const tiempo = document.getElementById('tiempoEstimado').innerText.replace('clock', '').trim();

            const msg = `*NUEVO PEDIDO*%0A%0A` +
                `*Local:* ${local}%0A` +
                `*Cliente:* ${nombre}%0A` +
                `*Teléfono:* ${tel}%0A%0A` +
                `*Costo:* ${costo}%0A` +
                `*${dist}*%0A` +
                `*Tiempo:* ${tiempo}%0A%0A` +
                `*Ubicación:* ${maps}`;

            window.open(`https://wa.me/593959698463?text=${msg}`, '_blank');
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
        }
    </script>
</body>
</html>
