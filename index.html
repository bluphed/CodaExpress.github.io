<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Delivery Express - Calculadora de Costos</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        #map {
            height: 400px;
            width: 100%;
            border-radius: 0.75rem;
            touch-action: pan-x pan-y;
            -webkit-overflow-scrolling: touch;
        }
        .custom-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .gesture-hint {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }
        .btn-touch {
            min-height: 48px;
            touch-action: manipulation;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #DE440D;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- Encabezado -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-2">
                <div class="bg-[#DE440D] p-2 rounded-lg text-white">
                    <i data-lucide="truck"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">Coda Express</h1>
            </div>
            <span class="text-xs font-medium bg-orange-100 text-[#DE440D] px-2 py-1 rounded-full">En línea</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Columna Izquierda -->
            <div class="space-y-6">
                <div class="bg-white p-4 rounded-2xl custom-shadow">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="map-pin" class="text-[#DE440D]"></i>
                        Ubicación del Pedido
                    </h2>
                    
                    <!-- Link de Google Maps -->
                    <div class="mb-4 p-3 bg-slate-50 rounded-xl">
                        <label class="block text-sm font-medium text-slate-700 mb-2">
                            <i data-lucide="link" class="inline w-4 h-4 mr-1"></i>
                            Link de Google Maps
                        </label>
                        <div class="flex gap-2">
                            <input type="text" id="mapsLink" placeholder="Pega el link aquí..." 
                                   class="flex-1 p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#DE440D] outline-none text-sm">
                            <button onclick="procesarLinkMaps()" 
                                    class="bg-[#DE440D] text-white px-4 py-2 rounded-xl hover:bg-[#b5360a] transition-colors btn-touch">
                                <i data-lucide="search" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Mapa -->
                    <div class="map-container relative">
                        <div id="map" class="bg-slate-200"></div>
                        <div class="gesture-hint">
                            <i data-lucide="move" class="w-4 h-4"></i>
                            <span>Desliza para mover el mapa</span>
                        </div>
                    </div>
                    
                    <p class="text-xs text-slate-400 mt-2 italic">
                        * Toca el mapa para marcar el punto de entrega
                    </p>
                </div>

                <div class="bg-white p-6 rounded-2xl custom-shadow space-y-4">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <i data-lucide="store" class="text-[#DE440D]"></i>
                        Seleccionar Local
                    </h2>
                    <select id="localSelect" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-[#DE440D] outline-none btn-touch">
                        <option value="cremita">La Cremita – Santo Domingo</option>
                        <option value="kfc">KFC Paseo Shopping</option>
                        <option value="custom">📍 Usar mi ubicación</option>
                    </select>
                </div>
            </div>

            <!-- Columna Derecha -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl custom-shadow space-y-4">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <i data-lucide="user" class="text-[#DE440D]"></i>
                        Datos del Cliente
                    </h2>
                    <input type="text" id="nombre" placeholder="Nombre del cliente" 
                           class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#DE440D] outline-none btn-touch">
                    <input type="tel" id="telefono" placeholder="Teléfono" 
                           class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#DE440D] outline-none btn-touch">
                    <textarea id="direccion" placeholder="Dirección exacta" 
                              class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#DE440D] outline-none h-24"></textarea>
                </div>

                <div id="resultadoCard" class="bg-[#DE440D] p-6 rounded-2xl text-white custom-shadow hidden">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-orange-100 uppercase text-xs font-bold tracking-widest">Costo Estimado</span>
                        <i data-lucide="calculator"></i>
                    </div>
                    <div class="text-4xl font-bold mb-2" id="costoFinal">$0.00</div>
                    <p class="text-sm text-orange-100" id="distanciaTexto">Distancia: 0.0 km</p>
                    <p class="text-xs text-orange-200 mt-1" id="detalleCosto"></p>
                    
                    <button onclick="enviarWhatsApp()" class="w-full mt-6 bg-white text-[#DE440D] font-bold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-orange-50 transition-colors btn-touch">
                        <i data-lucide="message-circle"></i>
                        Enviar por WhatsApp
                    </button>
                </div>

                <button onclick="calcular()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-slate-800 transition-all shadow-lg active:scale-95 btn-touch">
                    <i data-lucide="navigation"></i>
                    Calcular Entrega
                </button>
            </div>
        </div>
    </div>

    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDFR0mPU-jz-crPgioPus5UEdfeEZ90yk4&libraries=geometry,places&callback=initMap" async defer></script>

    <script>
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        let map;
        let markerRestaurante;
        let markerCliente;
        let restaurantePos = { lat: -0.245197, lng: -79.158230 }; // Santo Domingo
        let clientePos = null;
        let geocoder;

        const LOCALES = {
            cremita: { lat: -0.245197, lng: -79.158230, nombre: "La Cremita" },
            kfc: { lat: -0.248731, lng: -79.1617479, nombre: "KFC Paseo Shopping" }
        };

        // ============================================
        // INICIALIZACIÓN DEL MAPA
        // ============================================
        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: restaurantePos,
                zoom: 14,
                gestureHandling: 'greedy', // Móvil: 1 dedo
                zoomControl: true,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: true,
                styles: [{ "featureType": "poi", "stylers": [{ "visibility": "off" }] }]
            });

            geocoder = new google.maps.Geocoder();

            // Marcador del restaurante
            markerRestaurante = new google.maps.Marker({
                position: restaurantePos,
                map: map,
                title: "Local",
                icon: 'http://maps.google.com/mapfiles/ms/icons/green-dot.png'
            });

            // Click en mapa = marcar cliente
            map.addListener("click", (e) => {
                setCliente(e.latLng);
            });

            // Cambio de local
            document.getElementById('localSelect').addEventListener('change', function() {
                const val = this.value;
                if (LOCALES[val]) {
                    restaurantePos = LOCALES[val];
                    markerRestaurante.setPosition(restaurantePos);
                    map.panTo(restaurantePos);
                } else if (val === 'custom') {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                restaurantePos = {
                                    lat: position.coords.latitude,
                                    lng: position.coords.longitude
                                };
                                markerRestaurante.setPosition(restaurantePos);
                                map.setCenter(restaurantePos);
                                map.setZoom(16);
                            },
                            () => alert("No se pudo obtener tu ubicación")
                        );
                    }
                }
            });

            // Inicializar iconos de Lucide
            lucide.createIcons();
        }

        // ============================================
        // FUNCIÓN: Marcar cliente en el mapa
        // ============================================
        function setCliente(latLng) {
            if (markerCliente) {
                markerCliente.setPosition(latLng);
            } else {
                markerCliente = new google.maps.Marker({
                    position: latLng,
                    map: map,
                    title: "Cliente",
                    icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png',
                    draggable: true
                });

                markerCliente.addListener('dragend', function() {
                    const pos = markerCliente.getPosition();
                    clientePos = { lat: pos.lat(), lng: pos.lng() };
                    actualizarDireccion(pos);
                });
            }
            clientePos = { lat: latLng.lat(), lng: latLng.lng() };
            actualizarDireccion(latLng);
        }

        // ============================================
        // FUNCIÓN: Obtener dirección desde coordenadas
        // ============================================
        function actualizarDireccion(latLng) {
            geocoder.geocode({ location: latLng }, (results, status) => {
                if (status === "OK" && results[0]) {
                    document.getElementById('direccion').value = results[0].formatted_address;
                }
            });
        }

        // ============================================
        // FUNCIÓN: Procesar link de Google Maps
        // ============================================
        function procesarLinkMaps() {
            const link = document.getElementById('mapsLink').value.trim();
            if (!link) {
                alert("Por favor pega un link de Google Maps");
                return;
            }

            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span>';
            btn.disabled = true;

            extractCoordinatesFromLink(link)
                .then(coords => {
                    if (coords) {
                        const latLng = new google.maps.LatLng(coords.lat, coords.lng);
                        map.setCenter(latLng);
                        map.setZoom(18);
                        setCliente(latLng);
                        document.getElementById('mapsLink').value = '';
                    } else {
                        alert("No se pudieron extraer coordenadas del link");
                    }
                })
                .catch(error => {
                    alert("Error al procesar el link: " + error.message);
                })
                .finally(() => {
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                });
        }

        function extractCoordinatesFromLink(link) {
            return new Promise((resolve, reject) => {
                if (link.includes('goo.gl') || link.includes('maps.app.goo')) {
                    fetch(link, { method: 'HEAD', redirect: 'follow' })
                        .then(response => resolve(extractFromUrl(response.url)))
                        .catch(reject);
                } else {
                    resolve(extractFromUrl(link));
                }
            });
        }

        function extractFromUrl(url) {
            const latLngRegex = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
            const qRegex = /[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/;
            const placeRegex = /\/place\/.*?@(-?\d+\.\d+),(-?\d+\.\d+)/;

            let match = url.match(latLngRegex) || url.match(qRegex) || url.match(placeRegex);
            
            if (match) {
                return {
                    lat: parseFloat(match[1]),
                    lng: parseFloat(match[2])
                };
            }
            return null;
        }

        // ============================================
        // FUNCIÓN PRINCIPAL: CALCULAR COSTO
        // CON LA NUEVA LÓGICA DE PRECIOS
        // ============================================
        function calcular() {
            if (!clientePos) {
                alert("Por favor, marca la ubicación del cliente en el mapa.");
                return;
            }

            // Calcular distancia en kilómetros
            const dist = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(restaurantePos.lat, restaurantePos.lng),
                new google.maps.LatLng(clientePos.lat, clientePos.lng)
            );
            const km = dist / 1000;

            // ===== NUEVA LÓGICA DE PRECIOS =====
            // Tarifa base: $2.00 (cubre primeros ~1.4 km)
            // Cada 700 metros adicionales = +$0.25
            // SIN TOPE, progresivo real
            
            let total = 2.00; // Base
            let detalle = `Tarifa base: $2.00 (cubre hasta 1.4 km aprox)`;
            
            if (km > 1.4) {
                // Calculamos cuántos segmentos de 0.7 km hay después de los primeros 1.4 km
                const kmExtras = km - 1.4;
                const segmentos = Math.ceil(kmExtras / 0.7); // Redondeamos hacia arriba
                const extraTotal = segmentos * 0.25;
                total = 2.00 + extraTotal;
                
                detalle = `Distancia total: ${km.toFixed(2)} km
                Tarifa base: $2.00 (primeros 1.4 km)
                + ${segmentos} segmento(s) de 700m × $0.25 = $${extraTotal.toFixed(2)}
                Total: $${total.toFixed(2)}`;
            }

            // Redondear a 0.25 para facilitar vueltos
            total = Math.ceil(total * 4) / 4;

            // Mostrar resultados
            document.getElementById('costoFinal').innerText = `$${total.toFixed(2)}`;
            document.getElementById('distanciaTexto').innerText = `Distancia: ${km.toFixed(2)} km`;
            document.getElementById('detalleCosto').innerText = detalle;
            document.getElementById('resultadoCard').classList.remove('hidden');
            
            // Scroll suave
            document.getElementById('resultadoCard').scrollIntoView({ behavior: 'smooth' });
        }

        // ============================================
        // FUNCIÓN: Enviar por WhatsApp
        // ============================================
        function enviarWhatsApp() {
            const nombre = document.getElementById('nombre').value || "Cliente";
            const tel = document.getElementById('telefono').value || "No provisto";
            const dir = document.getElementById('direccion').value || "Ver mapa";
            const costo = document.getElementById('costoFinal').innerText;
            const dist = document.getElementById('distanciaTexto').innerText;
            const detalle = document.getElementById('detalleCosto').innerText;
            
            const localSelect = document.getElementById('localSelect');
            const localName = localSelect.options[localSelect.selectedIndex].text;

            const mapsLink = `https://www.google.com/maps?q=${clientePos.lat},${clientePos.lng}`;

            const mensaje = `*NUEVO PEDIDO DELIVERY*%0A%0A` +
                `*Local:* ${localName}%0A` +
                `*Cliente:* ${nombre}%0A` +
                `*Teléfono:* ${tel}%0A` +
                `*Dirección:* ${dir}%0A%0A` +
                `*Costo:* ${costo}%0A` +
                `*${dist}*%0A` +
                `*Detalle:* ${detalle.replace(/\n/g, ' ')}%0A%0A` +
                `*Ubicación en Maps:* ${mapsLink}`;

            window.open(`https://wa.me/593959698463?text=${mensaje}`, '_blank');
        }

        // ============================================
        // GARANTIZAR QUE TODO SE REINICIE AL REFRESCAR
        // ============================================
        window.addEventListener('load', function() {
            // Limpiar campos si es necesario
            if (markerCliente) {
                markerCliente.setMap(null);
                markerCliente = null;
            }
            clientePos = null;
            
            // Restaurar local por defecto
            restaurantePos = LOCALES.cremita;
            if (markerRestaurante) {
                markerRestaurante.setPosition(restaurantePos);
            }
            
            // Limpiar inputs
            document.getElementById('nombre').value = '';
            document.getElementById('telefono').value = '';
            document.getElementById('direccion').value = '';
            document.getElementById('mapsLink').value = '';
            document.getElementById('resultadoCard').classList.add('hidden');
            
            // Re-centrar mapa
            if (map) {
                map.setCenter(restaurantePos);
                map.setZoom(14);
            }
            
            console.log("Página refrescada correctamente");
        });
    </script>
</body>
</html>
