<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Coda Express - Calculadora de Delivery</title>

    <!-- MANIFEST -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Iconos -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon-180x180.png">
    <meta name="theme-color" content="#DE440D" id="themeColor">
    
    <!-- Meta PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CodaExpress">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --color-coda: #DE440D;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --card-bg: #ffffff;
        }

        .dark-mode {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border-color: #334155;
            --card-bg: #1e293b;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .bg-coda { background-color: var(--color-coda); }
        .text-coda { color: var(--color-coda); }
        .border-coda { border-color: var(--color-coda); }
        
        .bg-card {
            background-color: var(--card-bg);
            border-color: var(--border-color);
        }
        
        .text-secondary {
            color: var(--text-secondary);
        }
        
        .border-custom {
            border-color: var(--border-color);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.05);
        }

        #map {
            height: 400px;
            width: 100%;
            border-radius: 0.75rem;
            background-color: #e2e8f0;
            border: 2px solid var(--color-coda);
        }

        .btn-touch {
            min-height: 48px;
            transition: all 0.2s;
        }

        .btn-touch:active {
            transform: scale(0.98);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .glass-effect {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .time-badge {
            background: var(--color-coda);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Botón de tema (dark/light) -->
    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">
        <i data-lucide="moon" id="themeIcon"></i>
        <span id="themeText">Modo oscuro</span>
    </button>

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- Encabezado -->
        <header class="flex items-center justify-between mb-8 mt-12 md:mt-0">
            <div class="flex items-center gap-2">
                <div class="bg-coda p-2 rounded-lg text-white">
                    <i data-lucide="truck"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight" style="color: var(--color-coda);">Coda Express</h1>
            </div>
            <span class="text-xs font-medium bg-coda/10 text-coda px-2 py-1 rounded-full">En línea</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Columna Izquierda: Mapa y link -->
            <div class="space-y-6">
                <div class="bg-card p-4 rounded-2xl border border-custom shadow-sm">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="map-pin" style="color: var(--color-coda);"></i>
                        Ubicación del Pedido
                    </h2>
                    
                    <!-- Link de Google Maps -->
                    <div class="mb-4 p-3 bg-card rounded-xl border border-custom">
                        <label class="block text-sm font-medium text-secondary mb-2">
                            <i data-lucide="link" class="inline w-4 h-4 mr-1" style="color: var(--color-coda);"></i>
                            Link de Google Maps
                        </label>
                        <div class="flex gap-2">
                            <input type="text" id="mapsLink" placeholder="Ej: https://maps.app.goo.gl/7VVWt8VCDiwqpMPT7" 
                                   class="flex-1 p-3 rounded-xl border border-custom bg-card text-primary focus:ring-2 outline-none text-sm"
                                   style="focus:ring-color: var(--color-coda);">
                            <button onclick="procesarLinkMaps(event)" 
                                    class="bg-coda text-white px-4 py-2 rounded-xl hover:opacity-90 transition-all btn-touch">
                                <i data-lucide="search" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <p class="text-xs text-secondary mt-1">
                            ✅ Lee automáticamente links cortos y largos
                        </p>
                    </div>
                    
                    <!-- Mapa -->
                    <div class="relative">
                        <div id="map" class="bg-gray-200 rounded-xl" style="height: 400px;"></div>
                        <div class="absolute bottom-2 left-2 glass-effect text-white px-3 py-1 rounded-full text-xs flex items-center gap-1">
                            <i data-lucide="move" class="w-3 h-3"></i>
                            <span>Arrastra para mover</span>
                        </div>
                    </div>
                    
                    <p class="text-xs text-secondary mt-2 italic">
                        * Toca el mapa para marcar el punto de entrega
                    </p>
                </div>

                <div class="bg-card p-6 rounded-2xl border border-custom shadow-sm">
                    <h2 class="text-lg font-semibold flex items-center gap-2 mb-4">
                        <i data-lucide="store" style="color: var(--color-coda);"></i>
                        Seleccionar Local
                    </h2>
                    <select id="localSelect" class="w-full p-3 rounded-xl border border-custom bg-card text-primary focus:ring-2 outline-none btn-touch">
                        <option value="cremita">🍦 La Cremita – Santo Domingo</option>
                        <option value="custom">📍 Usar mi ubicación actual</option>
                    </select>
                </div>
            </div>

            <!-- Columna Derecha: Datos del cliente y resultado -->
            <div class="space-y-6">
                <div class="bg-card p-6 rounded-2xl border border-custom shadow-sm">
                    <h2 class="text-lg font-semibold flex items-center gap-2 mb-4">
                        <i data-lucide="user" style="color: var(--color-coda);"></i>
                        Datos del Cliente
                    </h2>
                    <input type="text" id="nombre" placeholder="Nombre del cliente" 
                           class="w-full p-3 rounded-xl border border-custom bg-card text-primary focus:ring-2 outline-none btn-touch mb-3">
                    <input type="tel" id="telefono" placeholder="Teléfono" 
                           class="w-full p-3 rounded-xl border border-custom bg-card text-primary focus:ring-2 outline-none btn-touch">
                    <!-- Campo de dirección eliminado -->
                </div>

                <!-- Tarjeta de resultado con tiempo estimado -->
                <div id="resultadoCard" class="bg-coda p-6 rounded-2xl text-white shadow-lg hidden fade-in">
                    <div class="flex items-center gap-2 mb-4">
                        <i data-lucide="clock" class="w-5 h-5 text-white/80"></i>
                        <span class="text-white/80 uppercase text-xs font-bold tracking-widest">Costo y tiempo</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <div class="text-3xl font-bold" id="costoFinal">$0.00</div>
                            <p class="text-xs text-white/80">Costo estimado</p>
                        </div>
                        <div class="text-right">
                            <div class="time-badge ml-auto" id="tiempoEstimado">
                                <i data-lucide="clock" class="w-4 h-4"></i>
                                <span>Calculando...</span>
                            </div>
                            <p class="text-xs text-white/80 mt-1">Tiempo estimado</p>
                        </div>
                    </div>
                    
                    <div class="border-t border-white/20 pt-4 mt-2">
                        <p class="text-sm text-white/90" id="distanciaTexto">Distancia: 0.0 km</p>
                        <p class="text-xs text-white/80 mt-1" id="detalleCosto"></p>
                        <p class="text-xs text-white/80 mt-1" id="detalleTiempo"></p>
                    </div>
                    
                    <button onclick="enviarWhatsApp()" class="w-full mt-5 bg-white text-coda font-bold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-white/90 transition-all btn-touch shadow-sm">
                        <i data-lucide="message-circle" class="w-5 h-5"></i>
                        Enviar por WhatsApp
                    </button>
                </div>

                <button onclick="calcular()" class="w-full bg-coda text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-lg hover:opacity-90 active:scale-95 btn-touch">
                    <i data-lucide="navigation"></i>
                    Calcular Entrega
                </button>
            </div>
        </div>
    </div>

    <!-- Google Maps API (con callback initMap) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDFR0mPU-jz-crPgioPus5UEdfeEZ90yk4&libraries=geometry,places&callback=initMap&v=weekly" async defer></script>

    <script>
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        let map;
        let markerRestaurante;
        let markerCliente;
        let restaurantePos = { lat: -0.245197, lng: -79.158230 };
        let clientePos = null;
        let geocoder;

        const LOCALES = {
            cremita: { lat: -0.245197, lng: -79.158230, nombre: "La Cremita" }
        };

        // ============================================
        // FUNCIÓN PARA CAMBIAR TEMA (DARK/LIGHT)
        // ============================================
        function toggleTheme() {
            const body = document.body;
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            const themeColor = document.getElementById('themeColor');
            
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                themeIcon.setAttribute('data-lucide', 'sun');
                themeText.textContent = 'Modo claro';
                themeColor.setAttribute('content', '#0f172a');
                localStorage.setItem('theme', 'dark');
            } else {
                themeIcon.setAttribute('data-lucide', 'moon');
                themeText.textContent = 'Modo oscuro';
                themeColor.setAttribute('content', '#DE440D');
                localStorage.setItem('theme', 'light');
            }
            lucide.createIcons();
        }

        // ============================================
        // CARGAR TEMA GUARDADO
        // ============================================
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            const themeColor = document.getElementById('themeColor');
            
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                themeIcon.setAttribute('data-lucide', 'sun');
                themeText.textContent = 'Modo claro';
                themeColor.setAttribute('content', '#0f172a');
            } else {
                document.body.classList.remove('dark-mode');
                themeIcon.setAttribute('data-lucide', 'moon');
                themeText.textContent = 'Modo oscuro';
                themeColor.setAttribute('content', '#DE440D');
            }
        }

        // ============================================
        // INICIALIZACIÓN DEL MAPA
        // ============================================
        function initMap() {
            try {
                map = new google.maps.Map(document.getElementById("map"), {
                    center: restaurantePos,
                    zoom: 14,
                    gestureHandling: 'greedy'
                });

                geocoder = new google.maps.Geocoder();

                markerRestaurante = new google.maps.Marker({
                    position: restaurantePos,
                    map: map,
                    title: "La Cremita",
                    icon: 'http://maps.google.com/mapfiles/ms/icons/green-dot.png'
                });

                map.addListener("click", (e) => {
                    setCliente(e.latLng);
                });

                document.getElementById('localSelect').addEventListener('change', function() {
                    const val = this.value;
                    if (LOCALES[val]) {
                        restaurantePos = LOCALES[val];
                        markerRestaurante.setPosition(restaurantePos);
                        map.panTo(restaurantePos);
                    } else if (val === 'custom') {
                        if (navigator.geolocation) {
                            navigator.geolocation.getCurrentPosition(
                                (position) => {
                                    restaurantePos = {
                                        lat: position.coords.latitude,
                                        lng: position.coords.longitude
                                    };
                                    markerRestaurante.setPosition(restaurantePos);
                                    map.setCenter(restaurantePos);
                                    map.setZoom(16);
                                },
                                () => alert("No se pudo obtener tu ubicación")
                            );
                        }
                    }
                });

                loadTheme();
                lucide.createIcons();
            } catch (error) {
                console.error("Error al inicializar mapa:", error);
            }
        }

        function setCliente(latLng) {
            if (markerCliente) {
                markerCliente.setPosition(latLng);
            } else {
                markerCliente = new google.maps.Marker({
                    position: latLng,
                    map: map,
                    title: "Cliente",
                    icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png',
                    draggable: true
                });
                markerCliente.addListener('dragend', function() {
                    const pos = markerCliente.getPosition();
                    clientePos = { lat: pos.lat(), lng: pos.lng() };
                });
            }
            clientePos = { lat: latLng.lat(), lng: latLng.lng() };
        }

        // ============================================
        // PROCESAR LINK DE GOOGLE MAPS (CORTO O LARGO)
        // ============================================
        async function procesarLinkMaps(event) {
    const linkInput = document.getElementById('mapsLink');
    let link = linkInput.value.trim();

    if (!link) {
        alert("❌ Por favor, pega un link de Google Maps");
        return;
    }

    const btn = event.currentTarget;
    const originalHtml = btn.innerHTML;
    btn.innerHTML = '<span class="loading"></span>';
    btn.disabled = true;

    try {
        let match = null;

        // 🔹 1. Detectar formato @lat,lng
        match = link.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);

        // 🔹 2. Detectar formato ?q=lat,lng
        if (!match) {
            match = link.match(/q=(-?\d+\.\d+),(-?\d+\.\d+)/);
        }

        // 🔹 3. Detectar formato !3dLAT!4dLNG (MUY IMPORTANTE)
        if (!match) {
            match = link.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
        }

        // 🔹 4. Si encontró coordenadas
        if (match) {
            const lat = parseFloat(match[1]);
            const lng = parseFloat(match[2]);

            const latLng = new google.maps.LatLng(lat, lng);
            map.setCenter(latLng);
            map.setZoom(18);
            setCliente(latLng);

            linkInput.value = '';
            alert("✅ Ubicación encontrada automáticamente");
            return;
        }

        // 🔥 5. Si NO encontró → abrir link (mejor solución real)
        // 🔥 5. Intentar con backend (links cortos)
if (esLinkCorto(link)) {
    const coords = await obtenerCoordenadasDesdeBackend(link);

    if (coords) {
        const latLng = new google.maps.LatLng(coords.lat, coords.lng);

        map.setCenter(latLng);
        map.setZoom(18);
        setCliente(latLng);

        linkInput.value = '';
        alert("✅ Ubicación encontrada automáticamente (link corto)");
        return;
    } else {
        alert("⚠️ No se pudo procesar automáticamente el link corto");
        window.open(link, "_blank");
        return;
    }
}

// 🔹 fallback normal
alert("⚠️ Este tipo de link no se puede leer directamente.\n\nSe abrirá, copia el link que aparece arriba y pégalo aquí.");
window.open(link, "_blank");

    } catch (error) {
        console.error(error);
        alert("❌ Error al procesar el link");
    } finally {
        btn.innerHTML = originalHtml;
        btn.disabled = false;
    }

        }

        // ============================================
        // CALCULAR COSTO Y TIEMPO ESTIMADO
        // ============================================
        function calcular() {
            if (!clientePos) {
                alert("Por favor, marca la ubicación del cliente en el mapa.");
                return;
            }

            const dist = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(restaurantePos.lat, restaurantePos.lng),
                new google.maps.LatLng(clientePos.lat, clientePos.lng)
            );
            const km = dist / 1000;

            // Cálculo de costo
            let total = 2.00;
            let detalle = "Base $2.00 (1.4 km)";
            
            if (km > 1.4) {
                const kmExtras = km - 1.4;
                const segmentos = Math.ceil(kmExtras / 0.7);
                const extraTotal = segmentos * 0.25;
                total = 2.00 + extraTotal;
                detalle = `Base + ${segmentos}×700m → $${extraTotal.toFixed(2)} extra`;
            }
            total = Math.ceil(total * 4) / 4;

            // Tiempo estimado (velocidad promedio 30 km/h)
            const velocidadPromedio = 30;
            const tiempoMinutos = Math.round((km / velocidadPromedio) * 60);
            
            let tiempoTexto = "";
            let detalleTiempo = "";
            if (tiempoMinutos < 1) {
                tiempoTexto = "Menos de 1 min";
                detalleTiempo = "Entrega muy cercana";
            } else if (tiempoMinutos < 60) {
                tiempoTexto = `${tiempoMinutos} min`;
                detalleTiempo = `Aprox. ${tiempoMinutos} minutos a 30 km/h`;
            } else {
                const horas = Math.floor(tiempoMinutos / 60);
                const minutos = tiempoMinutos % 60;
                tiempoTexto = `${horas}h ${minutos}min`;
                detalleTiempo = `Aprox. ${horas}h ${minutos}min a 30 km/h`;
            }

            // Mostrar resultados
            document.getElementById('costoFinal').innerText = `$${total.toFixed(2)}`;
            document.getElementById('distanciaTexto').innerText = `Distancia: ${km.toFixed(2)} km`;
            document.getElementById('detalleCosto').innerText = detalle;
            document.getElementById('tiempoEstimado').innerHTML = `
                <i data-lucide="clock" class="w-4 h-4"></i>
                <span>${tiempoTexto}</span>
            `;
            document.getElementById('detalleTiempo').innerText = detalleTiempo;
            
            document.getElementById('resultadoCard').classList.remove('hidden');
            document.getElementById('resultadoCard').scrollIntoView({ behavior: 'smooth' });
            lucide.createIcons();
        }

        // ============================================
        // ENVIAR POR WHATSAPP
        // ============================================
        function enviarWhatsApp() {
            if (!clientePos) {
                alert("Primero debes calcular el costo.");
                return;
            }
            
            const nombre = document.getElementById('nombre').value || "Cliente";
            const tel = document.getElementById('telefono').value || "No provisto";
            const costo = document.getElementById('costoFinal').innerText;
            const dist = document.getElementById('distanciaTexto').innerText;
            const localName = document.getElementById('localSelect').options[document.getElementById('localSelect').selectedIndex].text;
            const mapsLink = `https://www.google.com/maps?q=${clientePos.lat},${clientePos.lng}`;
            const tiempo = document.getElementById('tiempoEstimado').innerText.replace('clock', '').trim();

            const mensaje = `*NUEVO PEDIDO DELIVERY*%0A%0A` +
                `*Local:* ${localName}%0A` +
                `*Cliente:* ${nombre}%0A` +
                `*Teléfono:* ${tel}%0A%0A` +
                `*Costo:* ${costo}%0A` +
                `*${dist}*%0A` +
                `*Tiempo estimado:* ${tiempo}%0A%0A` +
                `*Ubicación:* ${mapsLink}`;

            window.open(`https://wa.me/593959698463?text=${mensaje}`, '_blank');
        }

        // ============================================
        // SERVICE WORKER
        // ============================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('✅ SW registrado'))
                    .catch(err => console.log('❌ Error SW:', err));
            });
        }
    </script>
</body>
</html>
