<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Delivery Express - Calculadora de Costos</title>
    
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons para los iconos -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        #map {
            height: 400px;
            width: 100%;
            border-radius: 0.75rem;
            touch-action: pan-x pan-y; /* Permite movimiento táctil */
            -webkit-overflow-scrolling: touch; /* Mejora scroll en iOS */
        }
        .custom-shadow {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .map-container {
            position: relative;
            overflow: hidden;
            touch-action: none; /* Mejora interacción táctil */
        }
        .gesture-hint {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(5px);
        }
        /* Mejora para táctil */
        .btn-touch {
            min-height: 48px;
            touch-action: manipulation;
        }
        /* Animación de carga */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #10b981;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- Encabezado -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-500 p-2 rounded-lg text-white">
                    <i data-lucide="truck"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">Coda Express</h1>
            </div>
            <span class="text-xs font-medium bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full">En línea</span>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Columna Izquierda: Mapa y Selección -->
            <div class="space-y-6">
                <div class="bg-white p-4 rounded-2xl custom-shadow">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="map-pin" class="text-emerald-500"></i>
                        Ubicación del Pedido
                    </h2>
                    
                    <!-- NUEVO: Campo para link de Google Maps -->
                    <div class="mb-4 p-3 bg-slate-50 rounded-xl">
                        <label class="block text-sm font-medium text-slate-700 mb-2">
                            <i data-lucide="link" class="inline w-4 h-4 mr-1"></i>
                            Link de Google Maps
                        </label>
                        <div class="flex gap-2">
                            <input type="text" id="mapsLink" placeholder="Pega el link aquí (corto o largo)..." 
                                   class="flex-1 p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none text-sm">
                            <button onclick="procesarLinkMaps()" 
                                    class="bg-emerald-500 text-white px-4 py-2 rounded-xl hover:bg-emerald-600 transition-colors touch:bg-emerald-700 btn-touch">
                                <i data-lucide="search" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <p class="text-xs text-slate-400 mt-1">Ej: https://maps.app.goo.gl/... o https://goo.gl/maps/...</p>
                    </div>
                    
                    <!-- Contenedor del mapa con hint táctil -->
                    <div class="map-container relative">
                        <div id="map" class="bg-slate-200"></div>
                        <div class="gesture-hint">
                            <i data-lucide="move" class="w-4 h-4"></i>
                            <span>Usa dos dedos para mover el mapa</span>
                        </div>
                    </div>
                    
                    <p class="text-xs text-slate-400 mt-2 italic flex items-center gap-1">
                        <i data-lucide="info" class="w-3 h-3"></i>
                        * Toca el mapa para marcar el punto de entrega o pega un link de Google Maps
                    </p>
                </div>

                <div class="bg-white p-6 rounded-2xl custom-shadow space-y-4">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <i data-lucide="store" class="text-emerald-500"></i>
                        Seleccionar Local
                    </h2>
                    <select id="localSelect" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-emerald-500 outline-none transition-all btn-touch">
                        <option value="cremita">La Cremita – Santo Domingo</option>
                        <option value="kfc">KFC Paseo Shopping</option>
                        <option value="custom">📍 Usar mi ubicación</option>
                    </select>
                </div>
            </div>

            <!-- Columna Derecha: Datos y Resultado -->
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl custom-shadow space-y-4">
                    <h2 class="text-lg font-semibold flex items-center gap-2">
                        <i data-lucide="user" class="text-emerald-500"></i>
                        Datos del Cliente
                    </h2>
                    <input type="text" id="nombre" placeholder="Nombre del cliente" 
                           class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none btn-touch">
                    <input type="tel" id="telefono" placeholder="Teléfono" 
                           class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none btn-touch">
                    <textarea id="direccion" placeholder="Dirección exacta" 
                              class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none h-24"></textarea>
                </div>

                <div id="resultadoCard" class="bg-emerald-600 p-6 rounded-2xl text-white custom-shadow hidden">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-emerald-100 uppercase text-xs font-bold tracking-widest">Costo Estimado</span>
                        <i data-lucide="calculator"></i>
                    </div>
                    <div class="text-4xl font-bold mb-2" id="costoFinal">$0.00</div>
                    <p class="text-sm text-emerald-100" id="distanciaTexto">Distancia: 0.0 km</p>
                    <p class="text-xs text-emerald-200 mt-1" id="detalleCosto"></p>
                    
                    <button onclick="enviarWhatsApp()" class="w-full mt-6 bg-white text-emerald-600 font-bold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-emerald-50 transition-colors btn-touch active:scale-95">
                        <i data-lucide="message-circle"></i>
                        Enviar por WhatsApp
                    </button>
                </div>

                <button onclick="calcular()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-slate-800 transition-all shadow-lg active:scale-95 btn-touch">
                    <i data-lucide="navigation"></i>
                    Calcular Entrega
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts de Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDFR0mPU-jz-crPgioPus5UEdfeEZ90yk4&libraries=geometry,places&callback=initMap" async defer></script>

    <script>
        let map;
        let markerRestaurante;
        let markerCliente;
        let restaurantePos = { lat: -0.245197, lng: -79.158230 }; // Santo Domingo
        let clientePos = null;
        let geocoder;
        let isLoading = false;

        const LOCALES = {
            cremita: { lat: -0.245197, lng: -79.158230, nombre: "La Cremita" },
            kfc: { lat: -0.248731, lng: -79.1617479, nombre: "KFC Paseo Shopping" }
        };

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: restaurantePos,
                zoom: 14,
                gestureHandling: 'greedy', // Permite mover el mapa con un dedo en móvil
                zoomControl: true,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: true,
                styles: [
                    { "featureType": "poi", "stylers": [{ "visibility": "off" }] }
                ]
            });

            geocoder = new google.maps.Geocoder();

            // Marcador inicial del restaurante
            markerRestaurante = new google.maps.Marker({
                position: restaurantePos,
                map: map,
                title: "Local",
                icon: 'http://maps.google.com/mapfiles/ms/icons/green-dot.png'
            });

            // Evento clic en el mapa
            map.addListener("click", (e) => {
                setCliente(e.latLng);
            });

            // Cambio de local
            document.getElementById('localSelect').addEventListener('change', function() {
                const val = this.value;
                if (LOCALES[val]) {
                    restaurantePos = LOCALES[val];
                    markerRestaurante.setPosition(restaurantePos);
                    map.panTo(restaurantePos);
                } else if (val === 'custom') {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                restaurantePos = {
                                    lat: position.coords.latitude,
                                    lng: position.coords.longitude
                                };
                                markerRestaurante.setPosition(restaurantePos);
                                map.setCenter(restaurantePos);
                                map.setZoom(16);
                            },
                            () => alert("No se pudo obtener tu ubicación")
                        );
                    }
                }
            });

            // Inicializar iconos
            lucide.createIcons();
        }

        // NUEVA FUNCIÓN: Procesar link de Google Maps
        function procesarLinkMaps() {
            const link = document.getElementById('mapsLink').value.trim();
            if (!link) {
                alert("Por favor pega un link de Google Maps");
                return;
            }

            // Mostrar indicador de carga
            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span>';
            btn.disabled = true;

            // Extraer coordenadas del link
            extractCoordinatesFromLink(link)
                .then(coords => {
                    if (coords) {
                        // Crear LatLng object
                        const latLng = new google.maps.LatLng(coords.lat, coords.lng);
                        
                        // Centrar mapa
                        map.setCenter(latLng);
                        map.setZoom(18);
                        
                        // Marcar cliente
                        setCliente(latLng);
                        
                        document.getElementById('mapsLink').value = '';
                    } else {
                        alert("No se pudieron extraer coordenadas del link. Asegúrate que sea un link válido de Google Maps");
                    }
                })
                .catch(error => {
                    alert("Error al procesar el link: " + error.message);
                })
                .finally(() => {
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                });
        }

        // Función para extraer coordenadas de diferentes tipos de links
        function extractCoordinatesFromLink(link) {
            return new Promise((resolve, reject) => {
                // Intentar diferentes formatos de Google Maps
                
                // Formato: https://maps.app.goo.gl/...
                if (link.includes('goo.gl') || link.includes('maps.app.goo')) {
                    // Para links cortos, necesitamos resolver la redirección
                    fetch(link, { method: 'HEAD', redirect: 'follow' })
                        .then(response => {
                            const finalUrl = response.url;
                            return extractFromUrl(finalUrl);
                        })
                        .then(resolve)
                        .catch(reject);
                } else {
                    // Intentar extraer directamente de la URL
                    resolve(extractFromUrl(link));
                }
            });
        }

        function extractFromUrl(url) {
            // Formato: @lat,lng o ?q=lat,lng o /search/lat,lng
            const latLngRegex = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
            const qRegex = /[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/;
            const placeRegex = /\/place\/.*?@(-?\d+\.\d+),(-?\d+\.\d+)/;

            let match = url.match(latLngRegex) || url.match(qRegex) || url.match(placeRegex);
            
            if (match) {
                return {
                    lat: parseFloat(match[1]),
                    lng: parseFloat(match[2])
                };
            }
            return null;
        }

        function setCliente(latLng) {
            if (markerCliente) {
                markerCliente.setPosition(latLng);
            } else {
                markerCliente = new google.maps.Marker({
                    position: latLng,
                    map: map,
                    title: "Cliente",
                    icon: 'http://maps.google.com/mapfiles/ms/icons/red-dot.png',
                    draggable: true // Permite arrastrar el marcador en móvil
                });

                // Evento para cuando se arrastra el marcador
                markerCliente.addListener('dragend', function() {
                    const pos = markerCliente.getPosition();
                    clientePos = { lat: pos.lat(), lng: pos.lng() };
                    actualizarDireccion(pos);
                });
            }
            clientePos = { lat: latLng.lat(), lng: latLng.lng() };
            
            actualizarDireccion(latLng);
        }

        function actualizarDireccion(latLng) {
            // Obtener dirección automáticamente
            geocoder.geocode({ location: latLng }, (results, status) => {
                if (status === "OK" && results[0]) {
                    document.getElementById('direccion').value = results[0].formatted_address;
                }
            });
        }

        function calcular() {
            if (!clientePos) {
                alert("Por favor, marca la ubicación del cliente en el mapa o pega un link de Google Maps.");
                return;
            }

            const dist = google.maps.geometry.spherical.computeDistanceBetween(
                new google.maps.LatLng(restaurantePos.lat, restaurantePos.lng),
                new google.maps.LatLng(clientePos.lat, clientePos.lng)
            );

            const km = dist / 1000;
            let total = 0;
            let detalle = "";

            // NUEVA LÓGICA: Precio progresivo SIN CONGELARSE
            if (km <= 1.5) {
                total = 1.90;
                detalle = `Tarifa mínima (hasta 1.5 km)`;
            } else if (km <= 5) {
                total = 2.50;
                detalle = `Tarifa base hasta 5 km`;
            } else if (km <= 10) {
                total = 3.50;
                detalle = `Zona 5-10 km`;
            } else if (km <= 15) {
                total = 4.50;
                detalle = `Zona 10-15 km`;
            } else {
                // PRECIO PROGRESIVO: Sigue subiendo después de 15 km
                // Base 4.50 + 0.35 por cada km adicional
                const kmExtras = km - 15;
                total = 4.50 + (kmExtras * 0.35);
                detalle = `Tarifa especial: $4.50 + $0.35 por km extra (${kmExtras.toFixed(2)} km adicionales)`;
            }

            // Redondear a múltiplos de 0.25 para facilitar el vuelto
            total = Math.ceil(total * 4) / 4;

            // Mostrar resultados
            document.getElementById('costoFinal').innerText = `$${total.toFixed(2)}`;
            document.getElementById('distanciaTexto').innerText = `Distancia: ${km.toFixed(2)} km`;
            document.getElementById('detalleCosto').innerText = detalle;
            document.getElementById('resultadoCard').classList.remove('hidden');
            
            // Scroll suave al resultado
            document.getElementById('resultadoCard').scrollIntoView({ behavior: 'smooth' });
        }

        function enviarWhatsApp() {
            const nombre = document.getElementById('nombre').value || "Cliente";
            const tel = document.getElementById('telefono').value || "No provisto";
            const dir = document.getElementById('direccion').value || "Ver mapa";
            const costo = document.getElementById('costoFinal').innerText;
            const dist = document.getElementById('distanciaTexto').innerText;
            const detalle = document.getElementById('detalleCosto').innerText;
            
            const localSelect = document.getElementById('localSelect');
            const localName = localSelect.options[localSelect.selectedIndex].text;

            const mapsLink = `https://www.google.com/maps?q=${clientePos.lat},${clientePos.lng}`;

            const mensaje = `*NUEVO PEDIDO DELIVERY*%0A%0A` +
                `*Local:* ${localName}%0A` +
                `*Cliente:* ${nombre}%0A` +
                `*Teléfono:* ${tel}%0A` +
                `*Dirección:* ${dir}%0A%0A` +
                `*Costo:* ${costo}%0A` +
                `*${dist}*%0A` +
                `*${detalle}*%0A%0A` +
                `*Ubicación en Maps:* ${mapsLink}`;

            window.open(`https://wa.me/593959698463?text=${mensaje}`, '_blank');
        }

        // Función para probar links de ejemplo
        function testLinks() {
            console.log("Ejemplos de links que funcionan:");
            console.log("- https://maps.app.goo.gl/abc123");
            console.log("- https://goo.gl/maps/abc123");
            console.log("- https://www.google.com/maps/@-0.245197,-79.158230,15z");
            console.log("- https://www.google.com/maps?q=-0.245197,-79.158230");
        }
    </script>
</body>
</html>
